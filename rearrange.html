<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-Arrange Apps</title>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
        }

        html {
            background-color: var(--bg-color);
            transition: background-color 0.75s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            color: var(--accent-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.75s ease, opacity 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            animation: fadeIn 0.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.85);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards !important;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
        }

        .close-btn,
        .save-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 2vw;
            border: 3px solid var(--accent-color);
            padding: 10px 25px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
        }

        .close-btn {
            right: 20px;
        }

        .save-btn {
            left: 20px;
        }

        .close-btn:hover,
        .save-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .close-btn:focus-visible,
        .save-btn:focus-visible {
            outline: 3px solid var(--accent-color);
            outline-offset: 5px;
        }

        h1 {
            font-size: 4vw;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
            margin: 0;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 40px;
            margin-top: 20px;
        }

        .grid-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .grid-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            position: relative;
            transition: opacity 0.3s ease;
        }

        #btn-back {
            position: absolute;
            left: 0;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        h2 {
            text-align: center;
            font-size: 2vw;
            margin: 0;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 110px);
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed var(--accent-color);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .grid-slot {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .grid-slot.drag-over {
            background: rgba(255, 255, 255, 0.2);
            border-style: dashed;
        }

        .drawer-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            display: flex;
            flex-direction: column;
        }

        .drawer-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
            transition: opacity 0.3s ease;
        }

        .folder-tools {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        .folder-tools button,
        .folder-tools select {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1vw;
            cursor: pointer;
        }

        .app-drawer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            overflow-y: auto;
            max-height: 50vh;
            padding-right: 5px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .draggable-app {
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid var(--accent-color);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            user-select: none;
            cursor: grab;
            font-weight: bold;
            font-size: 1.4vw;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            width: 100%;
            height: 100%;
        }

        .draggable-folder {
            flex-direction: column;
        }

        .draggable-app:active {
            cursor: grabbing;
        }

        .draggable-app:focus-visible {
            outline: 3px solid var(--accent-color);
            outline-offset: 2px;
        }

        .draggable-app.in-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto;
            border-color: #4CAF50;
        }

        #delete-zone {
            margin-top: 20px;
            border: 2px dashed #ff4c4c;
            color: #ff4c4c;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #delete-zone:focus-visible {
            outline: 3px solid #ff4c4c;
            outline-offset: 5px;
        }

        #delete-zone.drag-over {
            background: rgba(255, 76, 76, 0.2);
        }

        .view-transitioning {
            opacity: 0 !important;
            transform: scale(0.95);
            pointer-events: none;
        }

        .draggable-app.kbd-selected {
            border-color: #ffeb3b !important;
            box-shadow: 0 0 15px #ffeb3b;
            transform: scale(1.05);
            z-index: 1001;
            animation: pulse-border 1s infinite alternate;
        }

        @keyframes pulse-border {
            from {
                border-color: #ffeb3b;
            }

            to {
                border-color: var(--accent-color);
            }
        }

        .touch-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.8;
            transform: scale(0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Reset grid-slot positioning overrides */
            right: auto !important;
            bottom: auto !important;
            margin: 0 !important;
        }

        /* Screen Reader instruction */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }


        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-color);
            border: 3px solid var(--accent-color);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            background: var(--accent-color);
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            color: var(--bg-color);
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .modal-input::placeholder {
            color: var(--bg-color);
            opacity: 0.6;
            font-weight: normal;
        }

        .modal-input:focus {
            outline: none;
            filter: brightness(0.9);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.2);
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <script>
        (function () {
            const bg = localStorage.getItem('launcher-bg') || '#000000';
            const accent = localStorage.getItem('launcher-accent') || '#ffffff';
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--accent-color', accent);
        })();
    </script>
    <div class="header">
        <button class="save-btn" id="save-btn" tabIndex="0" aria-label="Save Layout">Save Layout</button>
        <h1>Arrange Config</h1>
        <a href="index.html" class="close-btn" aria-label="Cancel and return">Cancel</a>
    </div>

    <div class="container">
        <div class="grid-container">
            <div class="grid-header">
                <button id="btn-back" aria-label="Back to root grid">&larr; Back</button>
                <h2 id="grid-title">Launcher Grid</h2>
            </div>
            <div class="grid-3x3" id="launcher-grid">
                <div class="grid-slot" data-index="0"></div>
                <div class="grid-slot" data-index="1"></div>
                <div class="grid-slot" data-index="2"></div>
                <div class="grid-slot" data-index="3"></div>
                <div class="grid-slot" data-index="4"></div>
                <div class="grid-slot" data-index="5"></div>
                <div class="grid-slot" data-index="6"></div>
                <div class="grid-slot" data-index="7"></div>
                <div class="grid-slot" data-index="8"></div>
            </div>

            <div id="delete-zone" role="button" aria-label="Remove item from grid" tabIndex="0">Drag here or press Space
                to remove</div>
        </div>
        <div id="aria-status" class="sr-only" aria-live="polite"></div>


        <div class="drawer-container">
            <div class="drawer-header">
                <h2>Downloaded Apps</h2>
                <div class="folder-tools" id="folder-tools">
                    <button id="btn-custom-folder">+ New Folder</button>
                    <select id="sel-category-folder">
                        <option value="">+ Category Folder</option>
                    </select>
                </div>
            </div>
            <div class="app-drawer" id="app-drawer">
            </div>
        </div>
    </div>

    <!-- Folder Name Modal -->
    <div class="modal-overlay" id="folder-modal">
        <div class="modal-content">
            <h3>Name Your Folder</h3>
            <input type="text" id="folder-name-input" class="modal-input" placeholder="e.g. Games" autocomplete="off" />
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="folder-modal-cancel">Cancel</button>
                <button class="modal-btn" id="folder-modal-create">Create</button>
            </div>
        </div>
    </div>

    <script>
        let configApps = [];
        let userGrid = [];
        let currentFolder = null;
        let kbdSelectedId = null;
        let kbdSource = null; // 'grid' or 'drawer'
        let kbdSourceIndex = -1;
        let kbdIsFolder = false;

        function announce(msg) {
            document.getElementById('aria-status').textContent = msg;
        }

        function init() {
            let allApps = [];
            const cached = localStorage.getItem('launcher-apps-cache');
            if (cached) {
                try { allApps = JSON.parse(cached); } catch (e) { }
            }

            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "apps", "about", "re-arrange", "notifications", "shared-preferences"]');

            const systemIds = ["launcher-settings", "apps", "about", "re-arrange", "notifications", "shared-preferences"];

            if (!allApps || allApps.length === 0) {
                allApps = [
                    { id: "launcher-settings", name: "Settings", category: "System" },
                    { id: "apps", name: "Apps", category: "System" },
                    { id: "about", name: "About", category: "System" },
                    { id: "re-arrange", name: "Arrange", category: "System" },
                    { id: "notifications", name: "Notifications", category: "System" },
                    { id: "shared-preferences", name: "Shared Preferences", category: "System" }
                ];
            }

            configApps = allApps.filter(app => downloadedIds.includes(app.id) || systemIds.includes(app.id));

            // Populate categories
            const cats = new Set(configApps.map(a => a.category).filter(c => c));
            const selCategory = document.getElementById('sel-category-folder');
            Array.from(cats).sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                selCategory.appendChild(opt);
            });

            try {
                const saved = localStorage.getItem('launcher-grid');
                if (saved) userGrid = JSON.parse(saved);
            } catch (e) { }

            if (!userGrid || !Array.isArray(userGrid) || userGrid.length !== 9) {
                userGrid = [null, null, null, null, null, null, "launcher-settings", "apps", "re-arrange"];
            }

            // Convert old style nested data or validate
            for (let i = 0; i < userGrid.length; i++) {
                if (userGrid[i] && typeof userGrid[i] === 'object' && userGrid[i].type !== 'folder') {
                    userGrid[i] = null; // invalid object
                }
            }

            setupFolderUI();
            renderDrawer();
            renderGrid();
            setupDragAndDrop();
        }

        function activeGrid() {
            return currentFolder ? currentFolder.apps : userGrid;
        }

        function setupFolderUI() {
            document.getElementById('btn-back').addEventListener('click', () => {
                const gridEl = document.getElementById('launcher-grid');
                const drawerEl = document.getElementById('app-drawer');
                const titleEl = document.getElementById('grid-title');
                const toolsEl = document.getElementById('folder-tools');

                gridEl.classList.add('view-transitioning');
                drawerEl.classList.add('view-transitioning');
                titleEl.style.opacity = '0';
                toolsEl.style.opacity = '0';

                setTimeout(() => {
                    currentFolder = null;
                    document.getElementById('grid-title').textContent = 'Launcher Grid';
                    document.getElementById('btn-back').style.display = 'none';
                    toolsEl.style.display = 'flex';
                    renderGrid();

                    // Force reflow
                    void gridEl.offsetWidth;

                    gridEl.classList.remove('view-transitioning');
                    drawerEl.classList.remove('view-transitioning');
                    titleEl.style.opacity = '1';
                    toolsEl.style.opacity = '1';
                }, 300);
            });

            const modalInfo = {
                overlay: document.getElementById('folder-modal'),
                input: document.getElementById('folder-name-input'),
                btnCreate: document.getElementById('folder-modal-create'),
                btnCancel: document.getElementById('folder-modal-cancel')
            };

            const closeModal = () => {
                modalInfo.overlay.classList.remove('active');
                modalInfo.input.value = '';
            };

            const confirmModal = () => {
                const name = modalInfo.input.value.trim();
                if (name) {
                    createFolder(name, []);
                    closeModal();
                }
            };

            document.getElementById('btn-custom-folder').addEventListener('click', () => {
                modalInfo.overlay.classList.add('active');
                modalInfo.input.focus();
            });

            modalInfo.btnCancel.addEventListener('click', closeModal);
            modalInfo.btnCreate.addEventListener('click', confirmModal);
            modalInfo.input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') confirmModal();
                if (e.key === 'Escape') closeModal();
            });

            document.getElementById('sel-category-folder').addEventListener('change', (e) => {
                const cat = e.target.value;
                if (!cat) return;
                e.target.value = '';

                // Get all apps in this category
                const appsInCat = configApps.filter(a => a.category === cat).map(a => a.id);
                createFolder(cat, appsInCat);
            });
        }

        function createFolder(name, appIds) {
            const f = {
                type: 'folder',
                id: 'f_' + Date.now() + Math.floor(Math.random() * 1000),
                name: name,
                apps: Array(9).fill(null)
            };

            appIds.slice(0, 9).forEach((id, i) => f.apps[i] = id);

            const grid = activeGrid();
            const emptyIndex = grid.findIndex(x => !x);
            if (emptyIndex !== -1) {
                grid[emptyIndex] = f;
            } else {
                alert("No empty space in the current grid for a new folder.");
            }
            renderGrid();
        }

        function createAppNode(app, inGrid = false, index = -1) {
            const div = document.createElement('div');
            div.className = 'draggable-app' + (inGrid ? ' in-grid' : '');
            div.draggable = true;
            div.dataset.id = app.id;
            div.textContent = app.name;
            div.tabIndex = 0;
            div.setAttribute('role', 'button');
            div.setAttribute('aria-label', (inGrid ? 'Grid slot ' + (index + 1) + ': ' : 'Add ') + app.name);

            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('source', inGrid ? 'grid' : 'drawer');
                if (inGrid) {
                    e.dataTransfer.setData('sourceIndex', div.parentElement.dataset.index);
                } else {
                    e.dataTransfer.setData('appId', app.id);
                }
                setTimeout(() => div.style.opacity = '0.5', 0);
            });
            div.addEventListener('dragend', () => div.style.opacity = '1');

            // Keyboard/A11y logic
            div.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    if (kbdSelectedId && kbdSelectedId === app.id && kbdSource === (inGrid ? 'grid' : 'drawer')) {
                        // Deselect
                        kbdSelectedId = null;
                        renderGrid();
                        renderDrawer();
                        announce("De-selected " + app.name);
                    } else {
                        kbdSelectedId = app.id;
                        kbdSource = inGrid ? 'grid' : 'drawer';
                        kbdSourceIndex = inGrid ? index : -1;
                        kbdIsFolder = false;
                        renderGrid();
                        renderDrawer();
                        announce(app.name + " selected for moving. Tab to a grid slot or remove zone and press Space.");
                    }
                }
            });

            // Touch logic
            setupTouchEvents(div, app.id, inGrid, index, false);

            if (kbdSelectedId === app.id && kbdSource === (inGrid ? 'grid' : 'drawer')) {
                if (!inGrid || index === kbdSourceIndex) {
                    div.classList.add('kbd-selected');
                }
            }

            return div;
        }

        function createFolderNode(folder, inGrid, index) {
            const div = document.createElement('div');
            div.className = 'draggable-app draggable-folder' + (inGrid ? ' in-grid' : '');
            div.draggable = true;
            div.tabIndex = 0;
            div.setAttribute('role', 'button');
            div.setAttribute('aria-label', (inGrid ? 'Grid slot ' + (index + 1) + ': ' : 'Add ') + 'Folder ' + folder.name);

            div.innerHTML = `
                <svg class="folder-svg" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 2vw; height: 2vw; margin-bottom: 5px;">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <div>${folder.name}</div>
            `;

            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('source', 'grid');
                e.dataTransfer.setData('sourceIndex', div.parentElement.dataset.index);
                e.dataTransfer.setData('isFolder', 'true');
                setTimeout(() => div.style.opacity = '0.5', 0);
            });
            div.addEventListener('dragend', () => div.style.opacity = '1');

            // Open folder
            div.addEventListener('click', (e) => {
                // If keyboard mode is active, maybe we don't open? 
                // Actually we can open if double clicked or if it's not selected.
                if (!kbdSelectedId) openFolder(folder);
            });

            div.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    if (kbdSelectedId === folder.id) {
                        kbdSelectedId = null;
                        renderGrid();
                        announce("De-selected folder.");
                    } else if (e.altKey || e.ctrlKey) {
                        openFolder(folder);
                    } else {
                        kbdSelectedId = folder.id;
                        kbdSource = 'grid';
                        kbdSourceIndex = index;
                        kbdIsFolder = true;
                        renderGrid();
                        announce("Folder " + folder.name + " selected for moving.");
                    }
                }
            });

            setupTouchEvents(div, folder.id, inGrid, index, true);

            if (kbdSelectedId === folder.id) {
                div.classList.add('kbd-selected');
            }

            return div;
        }

        let ghost = null;
        let touchData = null;

        function setupTouchEvents(el, id, inGrid, index, isFolder) {
            el.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) return;
                const touch = e.touches[0];
                const rect = el.getBoundingClientRect();
                // Record where exactly in the element the finger landed
                const grabOffsetX = touch.clientX - rect.left;
                const grabOffsetY = touch.clientY - rect.top;

                touchData = {
                    id, inGrid, index, isFolder,
                    startX: touch.clientX,
                    startY: touch.clientY,
                    startTime: Date.now(),
                    grabOffsetX,
                    grabOffsetY
                };

                // Create ghost using element's actual rendered size
                ghost = el.cloneNode(true);
                ghost.classList.add('touch-ghost');
                ghost.style.width = rect.width + 'px';
                ghost.style.height = rect.height + 'px';
                ghost.style.left = (touch.clientX - grabOffsetX) + 'px';
                ghost.style.top = (touch.clientY - grabOffsetY) + 'px';
                document.body.appendChild(ghost);
            }, { passive: false });

            el.addEventListener('touchmove', (e) => {
                if (!ghost || !touchData) return;
                e.preventDefault();
                const touch = e.touches[0];
                // Follow the finger at the grab point (not centered)
                ghost.style.left = (touch.clientX - (touchData.grabOffsetX || ghost.offsetWidth / 2)) + 'px';
                ghost.style.top = (touch.clientY - (touchData.grabOffsetY || ghost.offsetHeight / 2)) + 'px';
            }, { passive: false });

            el.addEventListener('touchend', (e) => {
                if (!ghost) return;
                const touch = e.changedTouches[0];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                document.body.removeChild(ghost);
                ghost = null;

                // Handle tap vs drag
                if (Date.now() - touchData.startTime < 200 &&
                    Math.abs(touch.clientX - touchData.startX) < 10 &&
                    Math.abs(touch.clientY - touchData.startY) < 10) {
                    // Tap action
                    if (isFolder) openFolder(configApps.find(a => a.id === id) || { id });
                    touchData = null;
                    return;
                }

                // Find slot
                const slot = targetEl?.closest('.grid-slot');
                if (slot) {
                    dropIntoSlot(parseInt(slot.dataset.index), touchData);
                }

                const del = targetEl?.closest('#delete-zone');
                if (del) {
                    removeFromGrid(touchData.index);
                }

                touchData = null;
            });
        }

        // Returns true if 're-arrange' is reachable anywhere in userGrid:
        // directly in a slot OR inside any folder's apps array.
        // Uses a temporary-null trick so you can test "after removing slot X".
        function reArrangeExistsAnywhere() {
            for (const item of userGrid) {
                if (!item) continue;
                if (item === 're-arrange') return true;
                if (typeof item === 'object' && item.type === 'folder' && Array.isArray(item.apps)) {
                    if (item.apps.includes('re-arrange')) return true;
                }
            }
            return false;
        }

        // Returns false if removing/replacing grid[idx] would make re-arrange unreachable.
        // Protects both direct re-arrange slots AND folders that are the last home of re-arrange.
        // Because currentFolder.apps is a live reference inside userGrid, temporarily
        // nulling the slot covers both root and folder cases identically.
        function canReplaceAt(grid, idx) {
            const item = grid[idx];
            // Quick pass: only bother with the temp-null test if the slot could be
            // sheltering the last re-arrange (either directly or inside a folder).
            const holdsReArrange =
                item === 're-arrange' ||
                (typeof item === 'object' && item?.type === 'folder' &&
                    Array.isArray(item.apps) && item.apps.includes('re-arrange'));
            if (!holdsReArrange) return true;

            // Temporarily remove this slot and see if re-arrange is still reachable.
            grid[idx] = null;
            const ok = reArrangeExistsAnywhere();
            grid[idx] = item;
            return ok;
        }

        function dropIntoSlot(targetIndex, data) {
            const grid = activeGrid();
            if (data.inGrid) {
                // Swap: re-arrange stays in the grid, just changes position — always allowed
                const temp = grid[targetIndex];
                grid[targetIndex] = grid[data.index];
                grid[data.index] = temp;
            } else {
                // Overwrite: protect re-arrange if it would become unreachable
                if (!canReplaceAt(grid, targetIndex)) return;
                grid[targetIndex] = data.id;
            }
            renderGrid();
        }

        function removeFromGrid(idx) {
            if (idx === -1) return;
            const grid = activeGrid();
            if (!canReplaceAt(grid, idx)) return;
            grid[idx] = null;
            renderGrid();
        }


        function openFolder(folder) {
            const gridEl = document.getElementById('launcher-grid');
            const drawerEl = document.getElementById('app-drawer');
            const titleEl = document.getElementById('grid-title');
            const toolsEl = document.getElementById('folder-tools');

            gridEl.classList.add('view-transitioning');
            drawerEl.classList.add('view-transitioning');
            titleEl.style.opacity = '0';
            toolsEl.style.opacity = '0';

            setTimeout(() => {
                currentFolder = folder;
                document.getElementById('grid-title').textContent = 'Folder: ' + folder.name;
                document.getElementById('btn-back').style.display = 'block';
                toolsEl.style.display = 'none';
                renderGrid();

                // Force reflow
                void gridEl.offsetWidth;

                gridEl.classList.remove('view-transitioning');
                drawerEl.classList.remove('view-transitioning');
                titleEl.style.opacity = '1';
                toolsEl.style.opacity = '1';
            }, 300);
        }

        function renderDrawer() {
            const drawer = document.getElementById('app-drawer');
            drawer.innerHTML = '';
            configApps.forEach(app => {
                drawer.appendChild(createAppNode(app, false));
            });
        }

        function renderGrid() {
            const slots = document.querySelectorAll('.grid-slot');
            const grid = activeGrid();
            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "apps", "about", "re-arrange", "notifications", "shared-preferences"]');
            const systemIds = ["launcher-settings", "apps", "about", "re-arrange", "notifications", "shared-preferences"];

            slots.forEach((slot, idx) => {
                slot.innerHTML = '';
                const item = grid[idx];
                if (item) {
                    if (typeof item === 'object' && item.type === 'folder') {
                        // Validate items inside folder
                        if (item.apps) {
                            item.apps = item.apps.map(id => (id && !downloadedIds.includes(id) && !systemIds.includes(id)) ? null : id);
                        }
                        slot.appendChild(createFolderNode(item, true, idx));
                    } else {
                        // Check if uninstalled
                        if (!downloadedIds.includes(item) && !systemIds.includes(item)) {
                            grid[idx] = null; // Clean up orphan
                            return;
                        }
                        const app = configApps.find(a => a.id === item) || { id: item, name: item };
                        slot.appendChild(createAppNode(app, true, idx));
                    }
                }
            });
        }

        function setupDragAndDrop() {
            const slots = document.querySelectorAll('.grid-slot');
            slots.forEach(slot => {
                slot.tabIndex = 0;
                slot.setAttribute('aria-label', "Grid slot " + (parseInt(slot.dataset.index) + 1));

                slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
                slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
                slot.addEventListener('drop', e => {
                    e.preventDefault();
                    slot.classList.remove('drag-over');
                    const source = e.dataTransfer.getData('source');
                    const targetIndex = parseInt(slot.dataset.index);
                    const isFolder = e.dataTransfer.getData('isFolder') === 'true';
                    const payload = {
                        inGrid: source === 'grid',
                        index: parseInt(e.dataTransfer.getData('sourceIndex')),
                        id: e.dataTransfer.getData('appId'),
                        isFolder: isFolder
                    };
                    dropIntoSlot(targetIndex, payload);
                });

                slot.addEventListener('keydown', (e) => {
                    if ((e.key === ' ' || e.key === 'Enter') && kbdSelectedId) {
                        e.preventDefault();
                        const targetIndex = parseInt(slot.dataset.index);
                        const payload = {
                            inGrid: kbdSource === 'grid',
                            index: kbdSourceIndex,
                            id: kbdSelectedId,
                            isFolder: kbdIsFolder
                        };
                        dropIntoSlot(targetIndex, payload);
                        kbdSelectedId = null;
                        renderGrid();
                        announce("Item placed at slot " + (targetIndex + 1));
                    }
                });
            });

            const delZone = document.getElementById('delete-zone');
            delZone.addEventListener('keydown', (e) => {
                if ((e.key === ' ' || e.key === 'Enter') && kbdSelectedId && kbdSource === 'grid') {
                    e.preventDefault();
                    removeFromGrid(kbdSourceIndex);
                    kbdSelectedId = null;
                    renderGrid();
                    announce("Item removed from grid");
                }
            });

            delZone.addEventListener('dragover', e => { e.preventDefault(); delZone.classList.add('drag-over'); });
            delZone.addEventListener('dragleave', () => delZone.classList.remove('drag-over'));
            delZone.addEventListener('drop', e => {
                e.preventDefault();
                delZone.classList.remove('drag-over');
                const source = e.dataTransfer.getData('source');
                if (source === 'grid') {
                    const sourceIndex = parseInt(e.dataTransfer.getData('sourceIndex'));
                    const grid = activeGrid();
                    if (!canReplaceAt(grid, sourceIndex)) return;
                    grid[sourceIndex] = null;
                    renderGrid();
                }
            });
        }

        document.getElementById('save-btn').addEventListener('click', () => {
            localStorage.setItem('launcher-grid', JSON.stringify(userGrid));
            window.dispatchEvent(new StorageEvent('storage', { key: 'launcher-grid', newValue: JSON.stringify(userGrid) }));
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = getBackUrl(); }, 400);
        });

        init();

        const triggerFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => { }); } };
        document.addEventListener('DOMContentLoaded', triggerFullscreen);
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        const getBackUrl = () => {
            return sessionStorage.getItem('launchSource') === 'apps' ? 'apps.html' : 'index.html';
        };

        // History API back button interceptor
        history.replaceState({ page: 'applet' }, '');
        history.pushState({ page: 'applet-active' }, '');
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'applet') {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = getBackUrl(); }, 400);
            }
        });

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = getBackUrl(); }, 400);
            });
        });
    </script>
    <script src="notifications.js"></script>
</body>
