<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launcher</title>
    <script>
        (function () {
            const bg = localStorage.getItem('launcher-bg') || '#000000';
            const accent = localStorage.getItem('launcher-accent') || '#ffffff';
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--accent-color', accent);

            if (sessionStorage.getItem('lastAppIndex') !== null) {
                document.documentElement.classList.add('navigating-back');
                const fade = sessionStorage.getItem('lastFadeColor');
                if (fade && fade !== 'theme') {
                    const style = document.createElement('style');
                    style.id = 'temp-fade-style';
                    style.textContent = 'body { background-color: ' + fade + ' !important; transition: none !important; }';
                    document.documentElement.appendChild(style);
                }
            }

            window.addEventListener('DOMContentLoaded', () => {
                requestAnimationFrame(() => {
                    document.documentElement.classList.add('ready');
                });
            });
        })();
    </script>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: default;
        }

        html.ready body {
            transition: background-color 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        html.navigating-back #grid,
        html.navigating-back #header {
            opacity: 0 !important;
            transition: none !important;
        }

        #grid {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1.5vmin;
            width: 97vw;
            height: 85vh;
            z-index: 10;
        }

        .app {
            position: relative;
            border: 5px solid var(--accent-color);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            background: transparent;
        }

        .app.folder-app {
            flex-direction: column;
        }

        .app:hover {
            transform: scale(1.015);
        }

        .app:focus-visible {
            transform: scale(1.015);
            outline: 3px solid var(--accent-color);
            outline-offset: 5px;
        }

        .app-name {
            color: var(--accent-color);
            font-size: 3vw;
            font-weight: bold;
            text-align: center;
            user-select: none;
            padding: 10px;
            pointer-events: none;
        }

        #header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .header-item {
            color: var(--accent-color);
            font-size: 3vw;
            font-weight: bold;
            user-select: none;
        }

        .spin {
            animation-name: spin;
            animation-duration: 30s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            color: var(--accent-color);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2vw;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            z-index: 100;
        }

        #folder-back-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 15px;
            transition: background 0.2s;
        }

        #folder-back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <script>
        const savedBg = localStorage.getItem('launcher-bg');
        const savedAccent = localStorage.getItem('launcher-accent');
        if (savedBg) {
            document.documentElement.style.setProperty('--bg-color', savedBg);
            document.documentElement.style.setProperty('--accent-color', savedAccent || '#fff');
        }
    </script>

    <div id="header">
        <div id="date" class="header-item"></div>
        <div id="back-btn-container" class="header-item" style="display: none; cursor: pointer; pointer-events: auto;">
            <span id="folder-back-btn">&larr; Back</span>
            <span id="header-folder-title" style="margin-left: 15px;"></span>
        </div>

        <div style="display: flex; align-items: center;" class="header-item">
            <svg id="sync-success-icon" style="display: none; width: 3vw; height: 3vw; margin-right: 15px;"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Sync Success">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" opacity="0.4"></path>
                <polyline points="9 11 12 14 22 4" transform="translate(2, 2) scale(0.7)"></polyline>
            </svg>
            <svg id="sync-error-icon" style="display: none; width: 3vw; height: 3vw; margin-right: 15px;"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Sync Error">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" opacity="0.4"></path>
                <line x1="11" y1="13" x2="17" y2="19"></line>
                <line x1="17" y1="13" x2="11" y2="19"></line>
            </svg>
            <svg id="sync-unconfigured-icon" style="display: none; width: 3vw; height: 3vw; margin-right: 15px;"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Sync Unconfigured">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" opacity="0.4"></path>
                <line x1="7" y1="7" x2="17" y2="17"></line>
            </svg>
            <svg id="offline-icon" style="display: none; width: 3vw; height: 3vw; margin-right: 15px;"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Offline">
                <line x1="2" y1="2" x2="22" y2="22"></line>
                <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
                <path d="M5 12.5a11 11 0 0 1 2.37-1.74"></path>
                <path d="M11.66 8.35a11 11 0 0 1 7.34 4.2"></path>
                <path d="M1.43 9a16 16 0 0 1 3.2-1.89"></path>
                <path d="M9.82 4.16a16 16 0 0 1 12.75 4.84"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
            <div id="time" aria-live="polite"></div>
        </div>
    </div>

    <!-- The apps will dynamically populate here -->
    <div id="grid"></div>

    <script>
        const dateEl = document.getElementById('date');
        const timeEl = document.getElementById('time');
        let use24hr = localStorage.getItem('launcher-24hr') === 'true';
        let showSeconds = localStorage.getItem('launcher-seconds') !== 'false';
        let dateFormat = localStorage.getItem('launcher-date-format') || 'short';
        let tzManual = localStorage.getItem('launcher-tz-manual') === 'true';
        let tzOffset = parseInt(localStorage.getItem('launcher-tz-offset') || '0'); // minutes

        // Listen for storage changes in case settings applet updates them
        window.addEventListener('storage', (e) => {
            if (e.key === 'launcher-24hr') use24hr = e.newValue === 'true';
            if (e.key === 'launcher-seconds') showSeconds = e.newValue !== 'false';
            if (e.key === 'launcher-date-format') dateFormat = e.newValue || 'short';
            if (e.key === 'launcher-tz-manual') tzManual = e.newValue === 'true';
            if (e.key === 'launcher-tz-offset') tzOffset = parseInt(e.newValue || '0');
            if (e.key === 'launcher-bg') {
                document.documentElement.style.setProperty('--bg-color', e.newValue);
                if (!document.documentElement.classList.contains('navigating-back') && !animating) {
                    document.body.style.backgroundColor = '';
                }
            }
            if (e.key === 'launcher-accent') document.documentElement.style.setProperty('--accent-color', e.newValue);
            updateDateTime();
        });

        function updateDateTime() {
            const now = new Date();

            // Determine the display time: shift to manual offset if enabled
            let displayDate;
            if (tzManual) {
                // Convert now to UTC, then add desired offset
                const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
                displayDate = new Date(utcMs + tzOffset * 60000);
            } else {
                displayDate = now;
            }

            // Format date according to preference
            let dateStr;
            if (dateFormat === 'iso') {
                const y = displayDate.getFullYear();
                const mo = String(displayDate.getMonth() + 1).padStart(2, '0');
                const d = String(displayDate.getDate()).padStart(2, '0');
                dateStr = y + '-' + mo + '-' + d;
            } else if (dateFormat === 'numeric') {
                dateStr = displayDate.toLocaleDateString(undefined, { month: '2-digit', day: '2-digit', year: 'numeric' });
            } else if (dateFormat === 'long') {
                dateStr = displayDate.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            } else if (dateFormat === 'medium') {
                dateStr = displayDate.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
            } else {
                // short (default)
                dateStr = displayDate.toLocaleDateString(undefined, { weekday: 'short', month: 'numeric', day: 'numeric' });
            }
            dateEl.textContent = dateStr;

            // Format time (always base on the shifted displayDate hours/minutes)
            const timeOptions = { hour: 'numeric', minute: '2-digit', hour12: !use24hr };
            if (showSeconds) timeOptions.second = '2-digit';
            // Use a fixed locale time string from displayDate
            timeEl.textContent = displayDate.toLocaleTimeString([], timeOptions);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        let animating = false;
        let apps = [];
        let userGrid = [];
        let appMap = {};
        let currentFolder = null;

        document.getElementById('folder-back-btn').addEventListener('click', closeFolder);

        async function initLauncher() {
            let configApps = [];
            let isOffline = false;

            try {
                const res = await fetch('apps.json?t=' + new Date().getTime());
                const config = await res.json();
                configApps = config.apps || [];
                localStorage.setItem('launcher-apps-cache', JSON.stringify(configApps));
                document.getElementById('offline-icon').style.display = 'none';
            } catch (err) {
                console.warn("Failed to load apps.json, using offline cache.", err);
                isOffline = true;
                document.getElementById('offline-icon').style.display = 'block';
                const cached = localStorage.getItem('launcher-apps-cache');
                if (cached) {
                    try { configApps = JSON.parse(cached); } catch (e) { }
                }
            }

            const fallbackApps = {
                "launcher-settings": { name: "Settings", url: "settings.html", fade: "theme" },
                "apps": { name: "Apps", url: "apps.html", fade: "theme" },
                "about": { name: "About", url: "about.html", fade: "theme" },
                "re-arrange": { name: "Arrange", url: "rearrange.html", fade: "theme" },
                "notifications": { name: "Notifications", url: "notifications.html", fade: "theme" },
                "shared-preferences": { name: "Shared Preferences", url: "preferences.html", fade: "theme" },
                "changelog": { name: "Changelog", url: "changelog.html", fade: "theme" },
                "welcome": { name: "Welcome", url: "welcome.html", fade: "theme" },
                "sketch": { name: "Sketch", url: "sketch.html", fade: "theme" }
            };

            appMap = { ...fallbackApps };
            configApps.forEach(app => appMap[app.id] = app);

            // ── Migration: ensure system applets are always in downloaded IDs ──
            const requiredSystemIds = ["launcher-settings", "about", "apps", "re-arrange", "notifications", "shared-preferences", "changelog", "welcome", "sketch"];
            let downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '[]');
            let idsChanged = false;
            requiredSystemIds.forEach(id => {
                if (!downloadedIds.includes(id)) {
                    downloadedIds.push(id);
                    idsChanged = true;
                }
            });
            if (idsChanged) {
                localStorage.setItem('launcher-downloaded-ids', JSON.stringify(downloadedIds));
            }

            try {
                const saved = localStorage.getItem('launcher-grid');
                if (saved) userGrid = JSON.parse(saved);
            } catch (e) { }

            if (!userGrid || !Array.isArray(userGrid) || userGrid.length !== 9) {
                userGrid = [
                    null, null, null,
                    "changelog", "welcome", "shared-preferences",
                    "launcher-settings", "apps", "re-arrange"
                ];
            }
            // Ensure sketch is available if it exists
            if (requiredSystemIds.includes('sketch') && !downloadedIds.includes('sketch')) {
                downloadedIds.push('sketch');
                idsChanged = true;
            }

            const openFolderId = sessionStorage.getItem('openFolderId');
            if (openFolderId) {
                const folder = userGrid.find(x => x && typeof x === 'object' && x.id === openFolderId);
                if (folder) {
                    currentFolder = folder;
                    document.getElementById('date').style.display = 'none';
                    const bbc = document.getElementById('back-btn-container');
                    bbc.style.display = 'flex';
                    document.getElementById('header-folder-title').textContent = folder.name;
                    renderGridContents(folder.apps);
                } else {
                    renderGridContents(userGrid);
                }
            } else {
                renderGridContents(userGrid);
            }

            resetAnimations();
            preloadApps(configApps);
        }

        function renderGridContents(gridArray) {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';

            let appIndex = 0;
            gridArray.forEach((item) => {
                if (!item) {
                    const placeholder = document.createElement('div');
                    gridEl.appendChild(placeholder);
                    return;
                }

                const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "about", "apps", "re-arrange", "notifications", "shared-preferences", "changelog", "welcome", "sketch"]');
                const systemIds = ["launcher-settings", "about", "apps", "re-arrange", "notifications", "shared-preferences", "changelog", "welcome", "sketch"];

                if (typeof item === 'object' && item.type === 'folder') {
                    // Filter out uninstalled apps in this view too
                    const folderApps = item.apps.map(id => {
                        if (id && !downloadedIds.includes(id) && !systemIds.includes(id)) return null;
                        return id;
                    });

                    const div = document.createElement('div');
                    div.className = 'app folder-app';
                    div.tabIndex = 0;
                    div.setAttribute('role', 'button');
                    div.setAttribute('aria-label', item.name);

                    div.innerHTML = `
                        <svg class="folder-svg" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 4vw; height: 4vw; margin-bottom: 5px;">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <div class="app-name">${item.name}</div>
                    `;
                    gridEl.appendChild(div);

                    const currentIndex = appIndex++;
                    div.addEventListener('click', () => {
                        const updatedFolder = { ...item, apps: folderApps };
                        launchFolder(div, updatedFolder, currentIndex);
                    });
                    div.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            const updatedFolder = { ...item, apps: folderApps };
                            launchFolder(div, updatedFolder, currentIndex);
                        }
                    });
                    return;
                }

                if (item && !downloadedIds.includes(item) && !systemIds.includes(item)) {
                    // skip uninstalled app
                    const placeholder = document.createElement('div');
                    gridEl.appendChild(placeholder);
                    return;
                }

                const appData = appMap[item] || { name: 'Unknown', url: '#', fade: '#000000' };

                const div = document.createElement('div');
                div.className = 'app';
                div.dataset.url = appData.url;
                div.dataset.fade = appData.fade;
                div.tabIndex = 0;
                div.setAttribute('role', 'button');
                div.setAttribute('aria-label', appData.name);

                const nameDiv = document.createElement('div');
                nameDiv.className = 'app-name';
                nameDiv.textContent = appData.name;

                div.appendChild(nameDiv);
                gridEl.appendChild(div);

                const currentIndex = appIndex++;
                div.addEventListener('click', () => launchApp(div, currentIndex));
                div.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        launchApp(div, currentIndex);
                    }
                });
            });

            apps = document.querySelectorAll('.app');
        }

        function preloadDownloadedApps(appsData) {
            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '[]');
            const systemIds = ["launcher-settings", "about", "apps", "re-arrange", "notifications", "shared-preferences", "changelog", "welcome", "sketch"];

            // Also preload images if any (future-proofing)
            appsData.forEach(app => {
                if (downloadedIds.includes(app.id) && !systemIds.includes(app.id)) {
                    // background fetch contents to browser cache
                    if (app.url && app.url !== '#') {
                        fetch(app.url, { mode: 'no-cors' }).catch(() => { });
                    }
                }

                // Prefetch via link as well for better browser support
                if (app.url && !app.url.endsWith('.html') && app.url !== '#') {
                    const link = document.createElement('link');
                    link.rel = 'prefetch';
                    link.href = app.url;
                    document.head.appendChild(link);
                }
            });
        }

        function getAppTransitionData(appIndex) {
            if (!apps || apps.length === 0) return [];

            const originalTransforms = [];
            apps.forEach(a => {
                originalTransforms.push(a.style.transform);
                a.style.transform = 'none';
            });

            const app = apps[appIndex];
            if (!app) return [];

            const rect = app.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const data = Array.from(apps).map(otherApp => {
                const otherRect = otherApp.getBoundingClientRect();
                const otherCenterX = otherRect.left + otherRect.width / 2;
                const otherCenterY = otherRect.top + otherRect.height / 2;
                return {
                    dx: (otherCenterX - centerX) * 4,
                    dy: (otherCenterY - centerY) * 4
                };
            });

            apps.forEach((a, i) => {
                a.style.transform = originalTransforms[i];
            });

            return data;
        }

        function launchApp(app, index) {
            if (animating) return;
            animating = true;

            const url = app.dataset.url;
            const fadeColor = app.dataset.fade;

            const transitionStyle = 'all 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';
            const transitionData = getAppTransitionData(index);

            if (fadeColor && fadeColor !== 'theme') {
                document.body.style.backgroundColor = fadeColor;
            }

            document.getElementById('header').style.opacity = '0';

            apps.forEach((a, i) => {
                a.style.transition = transitionStyle;
                if (transitionData[i]) {
                    a.style.transform = `translate(${transitionData[i].dx}px, ${transitionData[i].dy}px) scale(4.5)`;
                } else {
                    a.style.transform = 'scale(4.5)';
                }
                a.style.opacity = '0';
                a.style.pointerEvents = 'none';
            });

            sessionStorage.setItem('lastAppIndex', index);
            sessionStorage.setItem('launchSource', 'launcher');
            if (fadeColor) {
                sessionStorage.setItem('lastFadeColor', fadeColor);
            } else {
                sessionStorage.removeItem('lastFadeColor');
            }
            if (currentFolder) {
                sessionStorage.setItem('openFolderId', currentFolder.id);
            } else {
                sessionStorage.removeItem('openFolderId');
            }

            setTimeout(() => {
                window.location.href = url;
            }, 750);
        }

        function launchFolder(appDiv, folderObj, index) {
            if (animating) return;
            animating = true;

            const transitionStyle = 'all 0.5s cubic-bezier(0.4, 0.0, 0.2, 1)';
            const transitionData = getAppTransitionData(index);

            document.getElementById('header').style.transition = 'opacity 0.2s';
            document.getElementById('header').style.opacity = '0';

            apps.forEach((a, i) => {
                a.style.transition = transitionStyle;
                if (transitionData[i]) {
                    a.style.transform = `translate(${transitionData[i].dx}px, ${transitionData[i].dy}px) scale(4.5)`;
                } else {
                    a.style.transform = 'scale(4.5)';
                }
                a.style.opacity = '0';
                a.style.pointerEvents = 'none';
            });

            // Store folder index for return animation
            sessionStorage.setItem('openFolderIndex', index);
            sessionStorage.setItem('launchSource', 'launcher');

            setTimeout(() => {
                currentFolder = folderObj;
                document.getElementById('date').style.display = 'none';
                const bbc = document.getElementById('back-btn-container');
                bbc.style.display = 'flex';
                document.getElementById('header-folder-title').textContent = folderObj.name;

                renderGridContents(folderObj.apps);

                apps.forEach((a) => {
                    a.style.transition = 'none';
                    a.style.transform = 'scale(0.8)';
                    a.style.opacity = '0';
                    a.style.pointerEvents = 'none';
                });

                void document.body.offsetHeight; // force reflow

                document.getElementById('header').style.transition = 'opacity 0.4s ease';
                document.getElementById('header').style.opacity = '1';

                apps.forEach((a) => {
                    a.style.transition = 'all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1)';
                    a.style.transform = 'scale(1)';
                    a.style.opacity = '1';
                    a.style.pointerEvents = 'auto';
                });

                setTimeout(() => {
                    animating = false;
                }, 400);

            }, 500);
        }

        function closeFolder() {
            if (animating) return;
            animating = true;

            const bbc = document.getElementById('back-btn-container');

            document.getElementById('header').style.transition = 'opacity 0.2s';
            document.getElementById('header').style.opacity = '0';

            apps.forEach(a => {
                a.style.transition = 'all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1)';
                a.style.transform = 'scale(0.8)';
                a.style.opacity = '0';
                a.style.pointerEvents = 'none';
            });

            setTimeout(() => {
                bbc.style.display = 'none';
                document.getElementById('date').style.display = 'block';

                const copyFolder = currentFolder;
                currentFolder = null;
                sessionStorage.removeItem('openFolderId');

                // Try to identify which index to return to
                let safeIndex = 0;
                let found = false;

                if (copyFolder) {
                    const idx = userGrid.findIndex(x => x && typeof x === 'object' && (x.id === copyFolder.id || x.name === copyFolder.name));
                    if (idx >= 0) {
                        safeIndex = idx;
                        found = true;
                    }
                }

                // Fallback to stored index if search fails
                if (!found) {
                    const storedIdx = sessionStorage.getItem('openFolderIndex');
                    if (storedIdx !== null) safeIndex = parseInt(storedIdx);
                }

                const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "about", "apps", "re-arrange", "notifications", "shared-preferences", "changelog", "welcome", "sketch"]');
                const systemIds = ["launcher-settings", "about", "apps", "re-arrange", "notifications", "shared-preferences", "changelog", "welcome", "sketch"];
                const actualAppIndex = userGrid.slice(0, safeIndex).filter(item => {
                    if (!item) return false;
                    if (typeof item === 'object') return true;
                    return downloadedIds.includes(item) || systemIds.includes(item);
                }).length;

                renderGridContents(userGrid);
                void document.body.offsetHeight; // Force layout before computing rects

                const transitionData = getAppTransitionData(actualAppIndex);
                const hasData = transitionData && transitionData.length === apps.length;

                apps.forEach((a, i) => {
                    a.style.transition = 'none';
                    if (hasData) {
                        a.style.transform = `translate(${transitionData[i].dx}px, ${transitionData[i].dy}px) scale(4.5)`;
                    } else {
                        a.style.transform = 'scale(4.5)';
                    }
                    a.style.opacity = '0';
                    a.style.pointerEvents = 'none';
                });

                void document.body.offsetHeight;

                document.getElementById('header').style.transition = 'opacity 0.4s ease';
                document.getElementById('header').style.opacity = '1';

                apps.forEach((a) => {
                    a.style.transition = 'all 0.5s cubic-bezier(0.4, 0.0, 0.2, 1)';
                    a.style.transform = 'translate(0px, 0px) scale(1)';
                    a.style.opacity = '1';
                    a.style.pointerEvents = 'auto';
                });

                sessionStorage.removeItem('openFolderIndex');

                setTimeout(() => {
                    animating = false;
                }, 500);

            }, 400);
        }

        function resetAnimations() {
            const lastIndexStr = sessionStorage.getItem('lastAppIndex');

            if (lastIndexStr === null || apps.length === 0) {
                document.body.style.backgroundColor = '';
                document.documentElement.classList.remove('navigating-back');
                apps.forEach(a => {
                    a.style.transition = 'all 0.6s ease-out';
                    a.style.transform = 'translate(0, 0) scale(1)';
                    a.style.opacity = '1';
                    a.style.pointerEvents = 'auto';
                });
                document.getElementById('header').style.opacity = '1';
                animating = false;
                return;
            }

            animating = true;
            let index = parseInt(lastIndexStr);
            let transitionData;
            const transitionStyle = 'all 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';

            if (index === 999) {
                // Return from system app (center fade-in)
                apps.forEach((a) => {
                    a.style.transition = 'none';
                    a.style.transform = 'scale(0.8)';
                    a.style.opacity = '0';
                    a.style.pointerEvents = 'none';
                });
            } else {
                if (index >= apps.length) {
                    sessionStorage.removeItem('lastAppIndex');
                    animating = false;
                    return resetAnimations();
                }
                transitionData = getAppTransitionData(index);
                apps.forEach((a, i) => {
                    a.style.transition = 'none';
                    a.style.transform = `translate(${transitionData[i].dx}px, ${transitionData[i].dy}px) scale(4.5)`;
                    a.style.opacity = '0';
                    a.style.pointerEvents = 'none';
                });
            }

            document.getElementById('header').style.opacity = '0';
            document.getElementById('header').style.transition = 'none';

            const fade = sessionStorage.getItem('lastFadeColor');
            if (fade && fade !== 'theme') {
                document.body.style.backgroundColor = fade;
            }

            const tempStyle = document.getElementById('temp-fade-style');
            if (tempStyle) tempStyle.remove();

            document.documentElement.classList.remove('navigating-back');
            void document.body.offsetHeight; // Force layout

            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.body.style.backgroundColor = '';

                    apps.forEach((a, i) => {
                        a.style.transition = transitionStyle;
                        a.style.transform = 'translate(0, 0) scale(1)';
                        a.style.opacity = '1';
                        a.style.pointerEvents = 'auto';
                    });

                    document.getElementById('header').style.transition = 'opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';
                    document.getElementById('header').style.opacity = '1';

                    setTimeout(() => {
                        animating = false;
                        apps.forEach(a => a.style.transition = '');
                        document.getElementById('header').style.transition = 'opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';
                        sessionStorage.removeItem('lastAppIndex');
                        sessionStorage.removeItem('lastFadeColor');
                        // Do not clear openFolderId here, it's used to remember where we are.
                    }, 800);
                }, 50);
            });
        }

        window.addEventListener('pageshow', (event) => {
            if (apps.length === 0 && !animating) {
                // If it's already loaded, initLauncher won't be called here, but initLauncher is called at DOMContentLoaded
            } else if (event.persisted || performance.navigation.type === 2) {
                resetAnimations();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initLauncher();
            triggerFullscreen();
        });

        const triggerFullscreen = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => { });
            }
        };
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        document.addEventListener('keydown', (event) => {
            if (event.key === 's' || event.key === 'S') {
                const allElements = document.querySelectorAll('*');
                allElements.forEach(element => {
                    element.classList.toggle('spin');
                });
            }
        });
    </script>
    <script src="notifications.js"></script>
    <script>
        // Sync Status Icons Handler
        (function () {
            function updateSyncIcons(status) {
                const success = document.getElementById('sync-success-icon');
                const error = document.getElementById('sync-error-icon');
                const unconfigured = document.getElementById('sync-unconfigured-icon');
                if (!success || !error || !unconfigured) return;

                success.style.display = 'none';
                error.style.display = 'none';
                unconfigured.style.display = 'none';

                if (status === 'connected') {
                    success.style.display = 'block';
                } else if (status === 'error' || status === 'disconnected') {
                    error.style.display = 'block';
                } else if (status === 'unconfigured') {
                    unconfigured.style.display = 'block';
                }
            }

            window.addEventListener('sync-status-change', (e) => {
                updateSyncIcons(e.detail);
            });

            // Initial check
            if (window.launcherNotifications && window.launcherNotifications.status) {
                updateSyncIcons(window.launcherNotifications.status);
            }
        })();
    </script>
