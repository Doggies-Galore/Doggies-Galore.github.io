<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Apps</title>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
        }

        html {
            background-color: var(--bg-color);
            transition: background-color 0.75s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            color: var(--accent-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
            overflow-y: auto;
            transition: background-color 0.75s ease, opacity 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            animation: fadeIn 0.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.85);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards !important;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 40px;
        }

        .close-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 2vw;
            border: 3px solid var(--accent-color);
            padding: 10px 25px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .close-btn:focus-visible {
            outline: 3px solid var(--accent-color);
            outline-offset: 5px;
        }

        h1 {
            font-size: 4vw;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
            margin: 0;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .app {
            border: 4px solid var(--accent-color);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s;
            height: 200px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
        }

        .app:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
        }

        .app:focus-visible {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            outline: 3px solid var(--accent-color);
            outline-offset: 5px;
        }

        .app-name {
            color: var(--accent-color);
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            user-select: none;
            margin-bottom: 10px;
        }

        .app-about {
            color: var(--accent-color);
            font-size: 1rem;
            opacity: 0.7;
            text-align: center;
            user-select: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .app-size {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .download-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .download-btn:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        .download-btn:disabled {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            cursor: default;
        }

        .offline-banner {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 76, 76, 0.2);
            border: 2px solid #ff4c4c;
            color: #ff4c4c;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 30px;
            display: none;
        }
    </style>
</head>

<body>
    <script>
        document.documentElement.style.setProperty('--bg-color', localStorage.getItem('launcher-bg') || '#000');
        document.documentElement.style.setProperty('--accent-color', localStorage.getItem('launcher-accent') || '#fff');
    </script>
    <div class="header">
        <h1>All Apps</h1>
        <a href="index.html" class="close-btn">Back</a>
    </div>

    <div id="offline-banner" class="offline-banner">
        No Internet Connection. Displaying offline apps only.
    </div>

    <div class="app-grid" id="app-grid">
        <!-- Apps will be injected here -->
    </div>

    <script>
        async function loadApps() {
            let dataApps = [];
            let isOffline = false;
            try {
                const res = await fetch('apps.json?t=' + new Date().getTime());
                const data = await res.json();
                dataApps = data.apps || [];
                localStorage.setItem('launcher-store-cache', JSON.stringify(dataApps));
            } catch (err) {
                console.warn('Offline: using store cache');
                isOffline = true;
                const banner = document.getElementById('offline-banner');
                if (banner) banner.style.display = 'block';
                const cached = localStorage.getItem('launcher-store-cache');
                if (cached) {
                    try { dataApps = JSON.parse(cached); } catch (e) { }
                }
                if (!dataApps || dataApps.length === 0) {
                    dataApps = [
                        { id: "launcher-settings", name: "Settings", url: "settings.html", about: "Configure your launcher." },
                        { id: "about", name: "About", url: "about.html", about: "Learn more about this project." },
                        { id: "re-arrange", name: "Arrange", url: "rearrange.html", about: "Organize your apps." }
                    ];
                }
            }

            const grid = document.getElementById('app-grid');
            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "about", "re-arrange"]');
            const appSizes = JSON.parse(localStorage.getItem('launcher-app-sizes') || '{}');

            const excludeIds = ['apps'];

            dataApps.forEach(app => {
                if (excludeIds.includes(app.id)) return;

                const card = document.createElement('div');
                card.className = 'app';
                card.tabIndex = 0;
                card.setAttribute('aria-label', app.name);

                const nameDiv = document.createElement('div');
                nameDiv.className = 'app-name';
                nameDiv.textContent = app.name;

                const aboutDiv = document.createElement('div');
                aboutDiv.className = 'app-about';
                aboutDiv.textContent = app.about || "";

                const isDownloaded = downloadedIds.includes(app.id);

                const sizeDiv = document.createElement('div');
                sizeDiv.className = 'app-size';
                if (isDownloaded) {
                    sizeDiv.textContent = appSizes[app.id] || (app.url.endsWith('.html') ? '45 KB' : '124 MB');
                } else {
                    sizeDiv.textContent = '';
                }

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = 'Download';

                card.appendChild(nameDiv);
                card.appendChild(aboutDiv);
                card.appendChild(sizeDiv);

                // Only show download button if not installed
                if (!isDownloaded) {
                    card.appendChild(downloadBtn);
                }

                grid.appendChild(card);

                const launch = (e) => {
                    // Only launch if it's already downloaded
                    if (!downloadedIds.includes(app.id)) {
                        downloadApp();
                        return;
                    }

                    if (app.fade && app.fade !== 'theme') {
                        document.body.style.backgroundColor = app.fade;
                    }
                    card.style.transition = 'all 0.5s ease';
                    card.style.transform = 'scale(2.5)';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = app.url;
                    }, 400);
                };

                const downloadApp = () => {
                    if (downloadedIds.includes(app.id)) return;
                    downloadBtn.textContent = 'Pre-caching...';
                    downloadBtn.disabled = true;

                    setTimeout(() => {
                        downloadedIds.push(app.id);
                        localStorage.setItem('launcher-downloaded-ids', JSON.stringify(downloadedIds));

                        // Generate a size
                        const size = app.url.endsWith('.html') ?
                            (Math.floor(Math.random() * 50) + 10) + ' KB' :
                            (Math.floor(Math.random() * 100) + 50) + ' MB';

                        const currentSizes = JSON.parse(localStorage.getItem('launcher-app-sizes') || '{}');
                        currentSizes[app.id] = size;
                        localStorage.setItem('launcher-app-sizes', JSON.stringify(currentSizes));

                        downloadBtn.remove();
                        sizeDiv.textContent = size;

                        // Also update the full app cache for rearrange.html to see it
                        localStorage.setItem('launcher-apps-cache', JSON.stringify(dataApps));
                    }, 1200);
                };

                card.addEventListener('click', launch);
                downloadBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    downloadApp();
                });
            });
        }
        loadApps();
        const triggerFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => { }); } };
        document.addEventListener('DOMContentLoaded', triggerFullscreen);
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        // History API back button interceptor
        history.replaceState({ page: 'applet' }, '');
        history.pushState({ page: 'applet-active' }, '');
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'applet') {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = 'index.html'; }, 400);
            }
        });

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = btn.href; }, 400);
            });
        });
    </script>
</body>

</html>
