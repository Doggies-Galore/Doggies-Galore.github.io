<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Apps</title>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
        }

        html {
            background-color: var(--bg-color);
            transition: background-color 0.75s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            color: var(--accent-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            transition: background-color 0.75s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            animation: fadeIn 0.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        html.navigating-back body {
            opacity: 0 !important;
            transition: none !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.85);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards !important;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            transition: opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .close-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 2vw;
            border: 3px solid var(--accent-color);
            padding: 10px 25px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .close-btn:focus-visible {
            outline: 3px solid var(--accent-color);
            outline-offset: 5px;
        }

        h1 {
            font-size: 4vw;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
            margin: 0;
        }

        #categories-container {
            width: 100%;
            max-width: 1200px;
        }

        .category-section {
            margin-bottom: 40px;
            transition: opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .category-title {
            font-size: 2vw;
            color: var(--accent-color);
            margin-bottom: 20px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            padding-left: 10px;
            transition: opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .app {
            border: 4px solid var(--accent-color);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s;
            height: 200px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            position: relative;
        }

        .app:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
        }

        .app:focus-visible {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            outline: 3px solid var(--accent-color);
            outline-offset: 5px;
        }

        .app-name {
            color: var(--accent-color);
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            user-select: none;
            margin-bottom: 10px;
        }

        .app-about {
            color: var(--accent-color);
            font-size: 1rem;
            opacity: 0.7;
            text-align: center;
            user-select: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .app-size {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .download-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .download-btn:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        .download-btn:disabled {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            cursor: default;
        }

        .offline-banner {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 76, 76, 0.2);
            border: 2px solid #ff4c4c;
            color: #ff4c4c;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 30px;
            display: none;
        }
    </style>
</head>

<body>
    <script>
        (function () {
            const bg = localStorage.getItem('launcher-bg') || '#000000';
            const accent = localStorage.getItem('launcher-accent') || '#ffffff';
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--accent-color', accent);

            // Match index.html logic
            if (sessionStorage.getItem('lastAppStoreIndex') !== null) {
                document.documentElement.classList.add('navigating-back');
                const fade = sessionStorage.getItem('lastFadeColor');
                if (fade && fade !== 'theme') {
                    const style = document.createElement('style');
                    style.id = 'temp-fade-style';
                    style.textContent = 'body { background-color: ' + fade + ' !important; transition: none !important; }';
                    document.documentElement.appendChild(style);
                }
            }
        })();
    </script>
    <div class="header" id="header">
        <h1>All Apps</h1>
        <a href="index.html" class="close-btn">Back</a>
    </div>

    <div id="offline-banner" class="offline-banner">
        No Internet Connection. Displaying offline apps only.
    </div>

    <div id="categories-container">
        <!-- Categories will be injected here -->
    </div>

    <script>
        let animating = false;
        let appsElements = [];
        let allAnimatableElements = [];

        async function loadApps() {
            let dataApps = [];
            let isOffline = false;
            try {
                const res = await fetch('apps.json?t=' + new Date().getTime());
                const data = await res.json();
                dataApps = data.apps || [];
                localStorage.setItem('launcher-store-cache', JSON.stringify(dataApps));
            } catch (err) {
                console.warn('Offline: using store cache');
                isOffline = true;
                const banner = document.getElementById('offline-banner');
                if (banner) banner.style.display = 'block';
                const cached = localStorage.getItem('launcher-store-cache');
                if (cached) {
                    try { dataApps = JSON.parse(cached); } catch (e) { }
                }
                if (!dataApps || dataApps.length === 0) {
                    dataApps = [
                        { id: "launcher-settings", name: "Settings", url: "settings.html", about: "Configure your launcher.", category: "System" },
                        { id: "about", name: "About", url: "about.html", about: "Learn more about this project.", category: "System" },
                        { id: "re-arrange", name: "Arrange", url: "rearrange.html", about: "Organize your apps.", category: "System" },
                        { id: "notifications", name: "Notifications", url: "notifications.html", about: "View your notification history.", category: "System" }
                    ];
                }
            }

            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "about", "re-arrange", "notifications"]');
            const appSizes = JSON.parse(localStorage.getItem('launcher-app-sizes') || '{}');

            const excludeIds = ['apps'];

            // Group apps by category
            const categoriesMap = {};
            dataApps.forEach(app => {
                if (excludeIds.includes(app.id)) return;
                const cat = app.category || "Other";
                if (!categoriesMap[cat]) categoriesMap[cat] = [];
                categoriesMap[cat].push(app);
            });

            // Sort category names alphabetically (maybe "System" at the end)
            const sortedCategories = Object.keys(categoriesMap).sort((a, b) => {
                if (a === "System") return 1;
                if (b === "System") return -1;
                return a.localeCompare(b);
            });

            let globalAppIndex = 0;
            appsElements = [];
            allAnimatableElements = [];

            sortedCategories.forEach(cat => {
                const catSection = document.createElement('div');
                catSection.className = 'category-section';

                const catTitle = document.createElement('h2');
                catTitle.className = 'category-title';
                catTitle.textContent = cat;
                allAnimatableElements.push(catTitle);
                catSection.appendChild(catTitle);

                const grid = document.createElement('div');
                grid.className = 'app-grid';

                categoriesMap[cat].forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app';
                    card.tabIndex = 0;
                    card.setAttribute('aria-label', app.name);

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'app-name';
                    nameDiv.textContent = app.name;

                    const aboutDiv = document.createElement('div');
                    aboutDiv.className = 'app-about';
                    aboutDiv.textContent = app.about || "";

                    const isDownloaded = downloadedIds.includes(app.id);

                    const sizeDiv = document.createElement('div');
                    sizeDiv.className = 'app-size';
                    if (isDownloaded) {
                        sizeDiv.textContent = appSizes[app.id] || (app.url.endsWith('.html') ? '45 KB' : '124 MB');
                    } else {
                        sizeDiv.textContent = '';
                    }

                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.textContent = 'Download';

                    card.appendChild(nameDiv);
                    card.appendChild(aboutDiv);
                    card.appendChild(sizeDiv);

                    if (!isDownloaded) {
                        card.appendChild(downloadBtn);
                    }

                    grid.appendChild(card);

                    const currentIndex = globalAppIndex++;
                    appsElements.push(card);
                    allAnimatableElements.push(card);

                    const downloadApp = async () => {
                        if (downloadedIds.includes(app.id)) return;
                        downloadBtn.textContent = 'Measuring...';
                        downloadBtn.disabled = true;

                        function formatSize(bytes) {
                            if (bytes < 1024) return bytes + ' B';
                            else if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
                        }

                        // Walk the full dependency tree: HTML + all local sub-resources
                        async function measureFullSize(appUrl) {
                            const fetched = new Set();
                            let totalBytes = 0;
                            const appBase = new URL(appUrl, window.location.href).href;

                            async function measureOne(url) {
                                const canonical = url.split('?')[0].split('#')[0];
                                if (fetched.has(canonical)) return;
                                fetched.add(canonical);
                                try {
                                    const res = await fetch(canonical, { cache: 'reload' });
                                    if (!res.ok) return;
                                    const blob = await res.blob();
                                    totalBytes += blob.size;
                                    // Live counter on the button
                                    downloadBtn.textContent = 'Measuring... ' + formatSize(totalBytes);

                                    // If HTML, parse and queue its local sub-resources
                                    if (/\.html?$/i.test(canonical)) {
                                        const text = await blob.text();
                                        const re = /(?:src|href)\s*=\s*["']([^"']+)["']/gi;
                                        let m;
                                        const tasks = [];
                                        while ((m = re.exec(text)) !== null) {
                                            const raw = m[1].trim();
                                            if (!raw) continue;
                                            if (/^https?:\/\//i.test(raw)) continue;  // skip external
                                            if (raw.startsWith('//') || raw.startsWith('data:') || raw.startsWith('#')) continue;
                                            if (/\.html?(?:[?#]|$)/i.test(raw)) continue; // skip nested HTML
                                            try {
                                                tasks.push(measureOne(new URL(raw, canonical).href));
                                            } catch (_) { }
                                        }
                                        await Promise.all(tasks); // parallel for speed
                                    }
                                } catch (_) { }
                            }

                            await measureOne(appBase);
                            return totalBytes;
                        }

                        let calculatedSize = 'Unknown';
                        try {
                            if (!app.url.startsWith('http')) {
                                // Local — preload and measure everything
                                const bytes = await measureFullSize(app.url);
                                calculatedSize = bytes > 0 ? formatSize(bytes) : '< 1 KB';
                            } else {
                                // External — ask the WebSocket bot if available
                                const address = localStorage.getItem('launcher-ws-address');
                                if (address) {
                                    calculatedSize = await new Promise((resolve) => {
                                        const ws = new WebSocket(address);
                                        const timeout = setTimeout(() => { ws.close(); resolve('Unknown'); }, 8000);
                                        ws.onopen = () => ws.send(JSON.stringify({ type: 'get_size', url: app.url }));
                                        ws.onmessage = (e) => {
                                            try {
                                                const data = JSON.parse(e.data);
                                                if (data.type === 'get_size' && data.size > 0) {
                                                    clearTimeout(timeout);
                                                    ws.close();
                                                    resolve(formatSize(data.size));
                                                }
                                            } catch (_) { clearTimeout(timeout); ws.close(); resolve('Unknown'); }
                                        };
                                        ws.onerror = () => { clearTimeout(timeout); resolve('Unknown'); };
                                    });
                                }
                            }
                        } catch (_) { }

                        // Add a minimum visual delay if the fetch was too fast
                        setTimeout(() => {
                            downloadedIds.push(app.id);
                            localStorage.setItem('launcher-downloaded-ids', JSON.stringify(downloadedIds));

                            const currentSizes = JSON.parse(localStorage.getItem('launcher-app-sizes') || '{}');
                            currentSizes[app.id] = calculatedSize;
                            localStorage.setItem('launcher-app-sizes', JSON.stringify(currentSizes));

                            downloadBtn.remove();
                            sizeDiv.textContent = calculatedSize;

                            localStorage.setItem('launcher-apps-cache', JSON.stringify(dataApps));
                        }, 300);
                    };

                    card.addEventListener('click', (e) => {
                        if (e.target === downloadBtn) return;
                        launchApp(card, app, currentIndex);
                    });
                    card.addEventListener('keydown', (e) => {
                        if (e.target === downloadBtn) return;
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            launchApp(card, app, currentIndex);
                        }
                    });

                    downloadBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        downloadApp();
                    });
                });

                catSection.appendChild(grid);
                container.appendChild(catSection);
            });

            resetAnimations();
        }

        function getAppTransitionData(targetElement) {
            const originalTransforms = [];
            allAnimatableElements.forEach(el => {
                originalTransforms.push(el.style.transform);
                el.style.transform = 'none';
            });

            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const data = allAnimatableElements.map(el => {
                const elRect = el.getBoundingClientRect();
                const elCenterX = elRect.left + elRect.width / 2;
                const elCenterY = elRect.top + elRect.height / 2;
                // Don't fade out the target itself in this map (handled separately)
                if (el === targetElement) return { dx: 0, dy: 0 };

                return {
                    dx: (elCenterX - centerX) * 4,
                    dy: (elCenterY - centerY) * 4
                };
            });

            allAnimatableElements.forEach((el, i) => {
                el.style.transform = originalTransforms[i];
            });

            return data;
        }

        function launchApp(card, appData, index) {
            if (animating) return;
            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '[]');
            if (!downloadedIds.includes(appData.id)) {
                // If clicked but not downloaded, trigger download via the button
                const btn = card.querySelector('.download-btn');
                if (btn) btn.click();
                return;
            }

            animating = true;
            const fadeColor = appData.fade;
            const transitionStyle = 'all 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';

            const transitionData = getAppTransitionData(card);

            if (fadeColor && fadeColor !== 'theme') {
                document.body.style.backgroundColor = fadeColor;
            }

            document.getElementById('header').style.opacity = '0';

            allAnimatableElements.forEach((el, i) => {
                el.style.transition = transitionStyle;
                if (el === card) {
                    el.style.transform = 'scale(4.5)';
                    el.style.opacity = '0';
                } else {
                    el.style.transform = `translate(${transitionData[i].dx}px, ${transitionData[i].dy}px) scale(4.5)`;
                    el.style.opacity = '0';
                }
                el.style.pointerEvents = 'none';
            });

            sessionStorage.setItem('lastAppStoreIndex', index);
            if (fadeColor) {
                sessionStorage.setItem('lastFadeColor', fadeColor);
            } else {
                sessionStorage.removeItem('lastFadeColor');
            }

            setTimeout(() => {
                window.location.href = appData.url;
            }, 750);
        }

        function resetAnimations() {
            const lastIndexStr = sessionStorage.getItem('lastAppStoreIndex');

            if (lastIndexStr === null || appsElements.length === 0) {
                document.body.style.backgroundColor = '';
                document.documentElement.classList.remove('navigating-back');
                allAnimatableElements.forEach(el => {
                    el.style.transition = 'all 0.6s ease-out';
                    el.style.transform = 'translate(0, 0) scale(1)';
                    el.style.opacity = '1';
                    el.style.pointerEvents = 'auto';
                });
                document.getElementById('header').style.opacity = '1';
                animating = false;
                return;
            }

            animating = true;
            const index = parseInt(lastIndexStr);

            if (index >= appsElements.length) {
                sessionStorage.removeItem('lastAppStoreIndex');
                animating = false;
                return resetAnimations();
            }

            const targetCard = appsElements[index];
            const transitionData = getAppTransitionData(targetCard);
            const transitionStyle = 'all 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';

            allAnimatableElements.forEach((el, i) => {
                el.style.transition = 'none';
                if (el === targetCard) {
                    el.style.transform = 'scale(4.5)';
                } else {
                    el.style.transform = `translate(${transitionData[i].dx}px, ${transitionData[i].dy}px) scale(4.5)`;
                }
                el.style.opacity = '0';
                el.style.pointerEvents = 'none';
            });
            document.getElementById('header').style.opacity = '0';
            document.getElementById('header').style.transition = 'none';

            const fade = sessionStorage.getItem('lastFadeColor');
            if (fade && fade !== 'theme') {
                document.body.style.backgroundColor = fade;
            }

            const tempStyle = document.getElementById('temp-fade-style');
            if (tempStyle) tempStyle.remove();

            document.documentElement.classList.remove('navigating-back');
            void document.body.offsetHeight; // Force layout

            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.body.style.backgroundColor = '';

                    allAnimatableElements.forEach((el, i) => {
                        el.style.transition = transitionStyle;
                        el.style.transform = 'translate(0, 0) scale(1)';
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'auto';
                    });

                    document.getElementById('header').style.transition = 'opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';
                    document.getElementById('header').style.opacity = '1';

                    setTimeout(() => {
                        animating = false;
                        allAnimatableElements.forEach(el => el.style.transition = '');
                        document.getElementById('header').style.transition = 'opacity 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';
                        sessionStorage.removeItem('lastAppStoreIndex');
                        sessionStorage.removeItem('lastFadeColor');
                    }, 800);
                }, 50);
            });
        }

        window.addEventListener('pageshow', (event) => {
            if (appsElements.length === 0 && !animating) {
                // ...
            } else if (event.persisted || performance.navigation.type === 2) {
                resetAnimations();
            }
        });

        // Offline Check logic
        if (!navigator.onLine) {
            const banner = document.getElementById('offline-banner');
            if (banner) banner.style.display = 'block';
            if (window.launcherNotifications && typeof window.launcherNotifications.handleIncoming === 'function') {
                window.launcherNotifications.handleIncoming({ type: 'system', author: 'System', content: "Some apps and Applets may be unavailable." });
            }
        }
        window.addEventListener('offline', () => {
            const banner = document.getElementById('offline-banner');
            if (banner) banner.style.display = 'block';
            if (window.launcherNotifications) {
                window.launcherNotifications.handleIncoming({ type: 'system', author: 'System', content: "Some apps and Applets may be unavailable." });
            }
        });

        loadApps();
        const triggerFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => { }); } };
        document.addEventListener('DOMContentLoaded', triggerFullscreen);
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        // History API back button interceptor
        history.replaceState({ page: 'applet' }, '');
        history.pushState({ page: 'applet-active' }, '');
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'applet') {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = 'index.html'; }, 400);
            }
        });

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = btn.href; }, 400);
            });
        });
    </script>
    <script src="notifications.js"></script>
</body>

</html>
