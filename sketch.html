<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes & Sketches</title>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
            --sidebar-width: 250px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        html,
        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background-color 0.7s ease;
        }

        body {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards !important;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        /* Sidebar Styles */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-right: 2px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #note-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-item {
            padding: 12px 15px;
            border: 1px solid transparent;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.7;
        }

        .note-item:hover {
            background: rgba(255, 255, 255, 0.05);
            opacity: 1;
        }

        .note-item.active {
            background: var(--accent-color);
            color: var(--bg-color);
            opacity: 1;
            font-weight: bold;
        }

        .note-item .delete-btn {
            opacity: 0;
            transition: opacity 0.2s;
            padding: 2px 8px;
            font-size: 0.8rem;
        }

        .note-item:hover .delete-btn {
            opacity: 1;
        }

        /* Main Content */
        #main-content {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #toolbar {
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-color);
            border: 4px solid var(--accent-color);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h3 {
            margin-bottom: 25px;
            font-size: 2rem;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-save-btn {
            flex: 2;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-cancel-btn {
            flex: 1;
            opacity: 0.7;
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .tool-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .tool-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        #editor-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        #master-scroll-area {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: relative;
            background: rgba(0, 0, 0, 0.1);
        }

        #split-view-container {
            display: flex;
            width: 100%;
            min-height: 100%;
            position: relative;
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            cursor: crosshair;
            pointer-events: auto;
        }

        #canvas-layer.locked {
            pointer-events: none;
        }

        #text-editor {
            width: 100%;
            height: auto;
            min-height: 100vh;
            padding: 40px;
            background: rgba(0, 0, 0, 0.4);
            color: var(--accent-color);
            border: none;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            z-index: 2;
            position: relative;
            pointer-events: none;
            opacity: 0.3;
            /* visible but faint in draw mode */
            transition: opacity 0.3s, background 0.3s;
            overflow: hidden;
        }

        #text-editor.active {
            pointer-events: auto;
            opacity: 1;
            background: rgba(0, 0, 0, 0.6);
        }

        #editor-container.split-mode #text-editor {
            flex: 1;
            width: 50%;
        }

        #editor-container.split-mode #markdown-preview {
            display: block;
            flex: 1;
            width: 50%;
            background: rgba(0, 0, 0, 0.2);
        }

        #markdown-preview {
            width: 100%;
            height: auto;
            min-height: 100vh;
            padding: 40px;
            background: transparent;
            color: var(--accent-color);
            z-index: 3;
            position: relative;
            pointer-events: auto;
            display: none;
            scrollbar-width: none;
            opacity: 0.3;
            /* visible but faint in draw mode */
            transition: opacity 0.3s;
            overflow: hidden;
        }

        #markdown-preview.active {
            opacity: 1;
        }

        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 15px;
            border: 1px solid var(--accent-color);
        }

        .toggle-tab {
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .toggle-tab.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        #close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .color-palette {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }

        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-swatch.active {
            border-color: var(--accent-color);
            transform: scale(1.1);
        }

        #note-title-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: bold;
            outline: none;
            margin-right: 20px;
            width: 250px;
        }

        /* Tiny Markdown-ish helpers */
        .formatting-tools {
            display: flex;
            gap: 5px;
            margin-left: 15px;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .formatting-tools.active {
            opacity: 1;
            pointer-events: auto;
        }



        #markdown-preview h1 {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        #markdown-preview h2 {
            margin-bottom: 15px;
            margin-top: 20px;
        }

        #markdown-preview b {
            color: var(--accent-color);
        }

        #markdown-preview del {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <script>
        (function () {
            const bg = localStorage.getItem('launcher-bg') || '#000000';
            const accent = localStorage.getItem('launcher-accent') || '#ffffff';
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--accent-color', accent);
            window.ACCENT_COLOR = accent;
            window.BG_COLOR = bg;
        })();
    </script>

    <div id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold;">Notes</span>
            <button class="tool-btn" id="add-note-btn">New</button>
        </div>
        <div id="note-list"></div>
    </div>

    <div id="main-content">
        <div id="toolbar">
            <input type="text" id="note-title-input" placeholder="Note Title">

            <div class="mode-toggle">
                <div class="toggle-tab active" id="draw-tab">Draw</div>
                <div class="toggle-tab" id="text-tab">Write</div>
            </div>

            <div id="draw-tools" style="display: flex; align-items: center; gap: 10px;">
                <button class="tool-btn active" id="pen-tool">Pen</button>
                <button class="tool-btn" id="eraser-tool">Eraser</button>
                <button class="tool-btn" id="clear-btn">Clear</button>
                <select id="stroke-size" class="tool-btn" style="background: var(--bg-color);">
                    <option value="2">Fine</option>
                    <option value="4" selected>Medium</option>
                    <option value="8">Thick</option>
                    <option value="20">Marker</option>
                </select>

                <div class="color-palette" id="palette">
                    <div class="color-swatch active" style="background: var(--accent-color);" data-color="theme"></div>
                    <div class="color-swatch" style="background: #ff4747;" data-color="#ff4747"></div>
                    <div class="color-swatch" style="background: #47ff85;" data-color="#47ff85"></div>
                    <div class="color-swatch" style="background: #47acff;" data-color="#47acff"></div>
                    <div class="color-swatch" style="background: #ffcc47;" data-color="#ffcc47"></div>
                </div>
            </div>

            <div class="formatting-tools" id="text-tools">
                <button class="tool-btn" data-wrap="**">B</button>
                <button class="tool-btn" data-wrap="~~">S</button>
                <button class="tool-btn" data-prefix="# ">H1</button>
                <button class="tool-btn" data-prefix="## ">H2</button>
            </div>
        </div>

        <div id="editor-container">
            <div id="master-scroll-area">
                <canvas id="canvas-layer"></canvas>
                <div id="split-view-container">
                    <textarea id="text-editor" placeholder="Start typing... (Markdown supported)"></textarea>
                    <div id="markdown-preview"></div>
                </div>
            </div>
        </div>

        <a href="index.html" class="tool-btn" id="close-btn">Exit</a>
    </div>

    <div class="modal-overlay" id="prompt-modal">
        <div class="modal-content">
            <h3 id="prompt-title">Confirm</h3>
            <p id="prompt-message" style="font-size: 1.2rem; margin-bottom: 30px; line-height: 1.5; opacity: 0.9;"></p>
            <div class="modal-actions">
                <button class="modal-cancel-btn" id="prompt-cancel-btn" style="border: none;">Cancel</button>
                <button class="modal-save-btn" id="prompt-ok-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="notifications.js"></script>
    <script>
        // Custom prompt wrapper
        function showPrompt(title, text, onConfirm) {
            document.getElementById('prompt-title').innerText = title;
            document.getElementById('prompt-message').innerText = text;
            const modal = document.getElementById('prompt-modal');
            const okBtn = document.getElementById('prompt-ok-btn');
            const cancelBtn = document.getElementById('prompt-cancel-btn');

            modal.classList.add('active');

            const cleanup = () => {
                modal.classList.remove('active');
                okBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            okBtn.onclick = () => { cleanup(); onConfirm(); };
            cancelBtn.onclick = cleanup;
        }
        let notes = JSON.parse(localStorage.getItem('launcher-notes') || '[]');
        let activeNoteId = localStorage.getItem('launcher-active-note-id') || null;
        let mode = 'draw';
        let drawColor = 'theme';
        let isDrawing = false;
        let activeTool = 'pen';
        let lastX = 0, lastY = 0;

        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const textEditor = document.getElementById('text-editor');
        const noteList = document.getElementById('note-list');
        const titleInput = document.getElementById('note-title-input');
        const ns = new NotificationService();

        // Initialization
        function init() {
            if (notes.length === 0) {
                createNewNote("Untitled Note");
            } else {
                if (!activeNoteId || !notes.find(n => n.id === activeNoteId)) {
                    activeNoteId = notes[0].id;
                }
                renderNoteList();
                loadNote(activeNoteId);
            }
            resizeCanvas();
        }

        function createNewNote(title = "New Note") {
            const id = 'note-' + Date.now();
            const newNote = {
                id,
                title,
                content: '',
                sketch: null,
                updated: Date.now()
            };
            notes.unshift(newNote);
            activeNoteId = id;
            saveNotes();
            renderNoteList();
            loadNote(id);
            broadcastNoteSync(newNote);
        }

        function renderNoteList() {
            noteList.innerHTML = '';
            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
                div.innerHTML = `
                    <span>${note.title}</span>
                    <button class="delete-btn tool-btn" onclick="deleteNote(event, '${note.id}')">Delete</button>
                `;
                div.onclick = () => selectNote(note.id);
                noteList.appendChild(div);
            });
        }

        function selectNote(id) {
            if (id === activeNoteId) return;
            activeNoteId = id;
            localStorage.setItem('launcher-active-note-id', id);
            renderNoteList();
            loadNote(id);
        }

        function deleteNote(e, id) {
            e.stopPropagation();
            showPrompt('Delete Note', 'Are you sure you want to delete this note? This action cannot be undone.', () => {
                notes = notes.filter(n => n.id !== id);
                if (activeNoteId === id) {
                    activeNoteId = notes.length > 0 ? notes[0].id : null;
                }
                saveNotes();
                if (activeNoteId) {
                    renderNoteList();
                    loadNote(activeNoteId);
                } else {
                    createNewNote();
                }
            });
        }

        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            titleInput.value = note.title;
            textEditor.value = note.content;
            renderMarkdown();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (note.sketch) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = note.sketch;
            }
        }

        function renderMarkdown() {
            const preview = document.getElementById('markdown-preview');
            const raw = textEditor.value;
            preview.innerHTML = raw
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>')
                .replace(/~~(.*?)~~/gim, '<del>$1</del>')
                .replace(/\n/gim, '<br>');

            // Adjust heights to ensure canvas covers all content
            const scrollArea = document.getElementById('master-scroll-area');
            const editorHeight = textEditor.scrollHeight;
            const previewHeight = preview.scrollHeight;
            const maxHeight = Math.max(editorHeight, previewHeight, scrollArea.clientHeight);

            textEditor.style.height = maxHeight + 'px';
            preview.style.height = maxHeight + 'px';
            if (canvas.height < maxHeight) {
                resizeCanvas(maxHeight);
            }
        }

        function saveNotes() {
            localStorage.setItem('launcher-notes', JSON.stringify(notes));
        }

        function updateActiveNote() {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.title = titleInput.value;
                note.content = textEditor.value;
                note.sketch = canvas.toDataURL();
                note.updated = Date.now();
                saveNotes();
                renderNoteList();
                renderMarkdown();
                broadcastNoteSync(note);
            }
        }

        function broadcastNoteSync(note) {
            ns.broadcastSync('launcher-notes', JSON.stringify(notes));
        }

        // Event Listeners for UI
        titleInput.oninput = updateActiveNote;
        textEditor.oninput = updateActiveNote;
        document.getElementById('add-note-btn').onclick = () => createNewNote();

        // Drawing Logic
        function resizeCanvas(forceHeight) {
            const scrollArea = document.getElementById('master-scroll-area');
            const container = document.getElementById('editor-container');
            const rect = container.getBoundingClientRect();
            const h = forceHeight || Math.max(rect.height, textEditor.scrollHeight, document.getElementById('markdown-preview').scrollHeight);

            // Preserve drawing
            const temp = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = scrollArea.clientWidth || rect.width; // Fix horizontal mapping offset!
            canvas.height = h;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.putImageData(temp, 0, 0);
        }
        window.onresize = resizeCanvas;

        function startDrawing(e) {
            if (mode !== 'draw') return;
            isDrawing = true;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            const rect = canvas.getBoundingClientRect();
            lastX = x - rect.left;
            lastY = y - rect.top;
        }

        function drawMove(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            const rect = canvas.getBoundingClientRect();
            const currX = x - rect.left;
            const currY = y - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currX, currY);

            if (activeTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 30;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = drawColor === 'theme' ? window.ACCENT_COLOR : drawColor;
                const size = document.getElementById('stroke-size').value;
                ctx.lineWidth = parseInt(size);
            }

            ctx.stroke();
            lastX = currX;
            lastY = currY;
        }

        function endDrawing() {
            if (isDrawing) {
                isDrawing = false;
                updateActiveNote();
            }
        }

        canvas.onmousedown = startDrawing;
        canvas.onmousemove = drawMove;
        canvas.onmouseup = endDrawing;
        canvas.onmouseleave = endDrawing;
        canvas.ontouchstart = startDrawing;
        canvas.ontouchmove = drawMove;
        canvas.ontouchend = endDrawing;

        // Tool Toggles
        document.getElementById('draw-tab').onclick = () => {
            mode = 'draw';
            textEditor.classList.remove('active');
            previewEl.classList.remove('active');
            canvas.classList.remove('locked');
            document.getElementById('editor-container').classList.add('split-mode'); // keep layout
            document.getElementById('draw-tab').classList.add('active');
            document.getElementById('text-tab').classList.remove('active');
            document.getElementById('draw-tools').style.display = 'flex';
            document.getElementById('text-tools').classList.remove('active');
            renderMarkdown();
        };

        document.getElementById('text-tab').onclick = () => {
            mode = 'text';
            textEditor.classList.add('active');
            previewEl.classList.add('active');
            canvas.classList.add('locked');
            document.getElementById('editor-container').classList.add('split-mode');
            document.getElementById('draw-tab').classList.remove('active');
            document.getElementById('text-tab').classList.add('active');
            document.getElementById('draw-tools').style.display = 'none';
            document.getElementById('text-tools').classList.add('active');
            renderMarkdown();
        };

        // Consolitate Clear logic
        const clearDrawing = () => {
            showPrompt('Clear Drawing', 'Are you sure you want to clear your drawing on this note?', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                updateActiveNote();
            });
        };

        document.getElementById('clear-btn').onclick = clearDrawing;

        // Parent controls scroll now.
        const previewEl = document.getElementById('markdown-preview');

        textEditor.onscroll = () => {
            if (isSyncingPreview) return;
            isSyncingText = true;
            const scrollPct = textEditor.scrollTop / (textEditor.scrollHeight - textEditor.clientHeight);
            previewEl.scrollTop = scrollPct * (previewEl.scrollHeight - previewEl.clientHeight);
            setTimeout(() => isSyncingText = false, 50);
        };

        previewEl.onscroll = () => {
            if (isSyncingText) return;
            isSyncingPreview = true;
            const scrollPct = previewEl.scrollTop / (previewEl.scrollHeight - previewEl.clientHeight);
            textEditor.scrollTop = scrollPct * (textEditor.scrollHeight - textEditor.clientHeight);
            setTimeout(() => isSyncingPreview = false, 50);
        };

        // Double Click Canvas in Text mode to toggle ink
        canvas.ondblclick = () => {
            if (mode === 'text') {
                canvas.classList.toggle('locked');
                if (!canvas.classList.contains('locked')) {
                    // Show a quick indicator or just let them draw
                }
            }
        };

        document.getElementById('pen-tool').onclick = () => {
            activeTool = 'pen';
            document.getElementById('pen-tool').classList.add('active');
            document.getElementById('eraser-tool').classList.remove('active');
        };

        document.getElementById('eraser-tool').onclick = () => {
            activeTool = 'eraser';
            document.getElementById('eraser-tool').classList.add('active');
            document.getElementById('pen-tool').classList.remove('active');
        };



        document.getElementById('palette').onclick = (e) => {
            if (e.target.classList.contains('color-swatch')) {
                drawColor = e.target.dataset.color;
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                if (activeTool === 'eraser') document.getElementById('pen-tool').click();
            }
        };

        // Text formatting helpers
        document.getElementById('text-tools').onclick = (e) => {
            const btn = e.target.closest('.tool-btn');
            if (!btn) return;
            const wrap = btn.dataset.wrap;
            const prefix = btn.dataset.prefix;
            const start = textEditor.selectionStart;
            const end = textEditor.selectionEnd;
            const text = textEditor.value;
            const selectedText = text.substring(start, end);

            if (wrap) {
                textEditor.value = text.substring(0, start) + wrap + selectedText + wrap + text.substring(end);
                textEditor.setSelectionRange(start + wrap.length, end + wrap.length);
            } else if (prefix) {
                const lineStart = text.lastIndexOf('\n', start - 1) + 1;
                textEditor.value = text.substring(0, lineStart) + prefix + text.substring(lineStart);
            }
            textEditor.focus();
            updateActiveNote();
        };

        // Cloud Incoming Sync
        window.addEventListener('storage', (e) => {
            if (e.key === 'launcher-notes') {
                const newNotes = JSON.parse(e.newValue);
                // Simple merge based on 'updated' timestamp
                if (Array.isArray(newNotes)) {
                    notes = newNotes;
                    renderNoteList();
                    loadNote(activeNoteId);
                }
            }
        });

        // Close logic
        const getBackUrl = () => {
            return sessionStorage.getItem('launchSource') === 'apps' ? 'apps.html' : 'index.html';
        };
        document.getElementById('close-btn').onclick = (e) => {
            e.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = getBackUrl(); }, 400);
        };

        // Fullscreen
        const triggerFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => { }); } };
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        init();
    </script>
</body>

</html>
