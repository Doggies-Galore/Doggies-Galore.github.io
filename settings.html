<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background-color: var(--bg-color);
        }

        html.ready {
            transition: background-color 0.75s ease;
        }

        body {
            background-color: transparent;
            color: var(--accent-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-y: auto;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            opacity: 0;
            transform: scale(0.9);
        }

        body.ready {
            transition: background-color 0.75s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            opacity: 1;
            transform: scale(1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.85);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards !important;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 40px;
        }

        .close-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 2vw;
            cursor: pointer;
            border: 3px solid var(--accent-color);
            padding: 10px 25px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        h1 {
            font-size: 4vw;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
        }

        .section {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 2vw;
            margin-bottom: 25px;
            opacity: 0.9;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            background: transparent;
            transition: all 0.2s;
            font-weight: bold;
            text-align: center;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        label {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 25px;
            height: 25px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .color-picker-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        input[type="color"] {
            width: 80px;
            height: 50px;
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 2px;
            background: none;
            cursor: pointer;
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .app-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .app-name-label {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .delete-btn {
            background: #ff4c4c;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-color);
            border: 4px solid var(--accent-color);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h3 {
            margin-bottom: 25px;
            font-size: 2rem;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .modal-field {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .modal-field span {
            display: block;
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
            margin-left: 10px;
        }

        .modal-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            color: var(--accent-color);
            font-size: 1.1rem;
            outline: none;
        }

        .modal-error-msg {
            color: #ff4c4c;
            font-size: 1rem;
            margin-top: 15px;
            margin-bottom: -10px;
            font-weight: bold;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-save-btn {
            flex: 2;
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .modal-cancel-btn {
            flex: 1;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <script>
        (function () {
            const bg = localStorage.getItem('launcher-bg') || '#000000';
            const accent = localStorage.getItem('launcher-accent') || '#ffffff';
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--accent-color', accent);

            window.addEventListener('DOMContentLoaded', () => {
                requestAnimationFrame(() => {
                    document.documentElement.classList.add('ready');
                    document.body.classList.add('ready');
                });
            });
        })();
    </script>
    <div class="header">
        <h1>Settings</h1>
        <a href="index.html" class="close-btn">Back</a>
    </div>

    <!-- Clock Settings -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">Clock Preferences</h2>
        <div class="row">
            <label><input type="checkbox" id="check-24hr"> 24-Hour Mode</label>
            <label style="margin-left: 30px;"><input type="checkbox" id="check-seconds"> Show Seconds</label>
        </div>
    </div>

    <div class="section" style="text-align: center;">
        <h2 class="section-title">Notification & Sync Settings</h2>
        <div id="sync-status" style="margin-bottom: 20px; font-weight: bold; opacity: 0.8;">Status: Loading...</div>
        <div
            style="display: flex; flex-direction: column; gap: 20px; align-items: center; max-width: 500px; margin: 0 auto;">
            <button id="config-btn" class="btn"
                style="width: 100%; background: var(--accent-color); color: var(--bg-color);">Configure Sync &
                Notifications...</button>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;">
                <button id="backup-btn" class="btn" style="font-size: 0.9rem; padding: 10px;">File Backup</button>
                <button id="restore-btn" class="btn" style="font-size: 0.9rem; padding: 10px;">File Restore</button>
                <button id="cloud-backup-btn" class="btn" style="font-size: 0.9rem; padding: 10px;">Cloud
                    Backup</button>
                <button id="cloud-restore-btn" class="btn" style="font-size: 0.9rem; padding: 10px;">Cloud
                    Restore</button>
            </div>

            <div class="row" style="margin-top: 10px;">
                <label><input type="checkbox" id="check-dnd"> Do Not Disturb</label>
                <label style="margin-left: 30px;"><input type="checkbox" id="check-silent"> Do Not Receive</label>
            </div>
        </div>
    </div>

    <!-- Sync Modal -->
    <div class="modal-overlay" id="sync-modal">
        <div class="modal-content">
            <h3 id="modal-title">Sign In</h3>
            <div id="modal-mode-toggle" style="margin-bottom: 25px;">
                <button class="btn" id="mode-login"
                    style="padding: 10px 20px; font-size: 1rem; border-color: var(--accent-color); background: var(--accent-color); color: var(--bg-color);">Login</button>
                <button class="btn" id="mode-register"
                    style="padding: 10px 20px; font-size: 1rem; opacity: 0.6;">Register</button>
            </div>
            <div class="modal-field">
                <span>WebSocket Address</span>
                <input type="text" id="modal-ws-address" class="modal-input" placeholder="ws://localhost:8080">
            </div>
            <div class="modal-field">
                <span>Username</span>
                <input type="text" id="modal-ws-user" class="modal-input" placeholder="User123">
            </div>
            <div class="modal-field">
                <span>Auth Token / Password</span>
                <input type="password" id="modal-ws-token" class="modal-input" placeholder="••••••••">
            </div>
            <div id="modal-error" class="modal-error-msg"></div>
            <div class="modal-actions">
                <button class="btn modal-cancel-btn" id="modal-cancel" style="border: none;">Cancel</button>
                <button class="btn modal-save-btn" id="modal-save">Connect</button>
            </div>
        </div>
    </div>


    <!-- Presets -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">Theme Presets</h2>
        <div class="theme-grid">
            <button class="btn" onclick="setTheme('#000000', '#ffffff')">IAmAnOLED</button>
            <button class="btn" onclick="setTheme('#1a1a1a', '#ffffff')">Dark Gray</button>
            <button class="btn" onclick="setTheme('#ffffff', '#000000')">Light Mode</button>
            <button class="btn" onclick="setTheme('#001524', '#ffecd1')">Midnight</button>
            <button class="btn" onclick="setTheme('#2d1b4e', '#d4b8ff')">Purple</button>
            <button class="btn" onclick="setTheme('#4a1528', '#ffb3c6')">Pink</button>
            <button class="btn" onclick="setTheme('#3d1c00', '#ffb067')">Orange</button>
            <button class="btn" onclick="setTheme('#0b2b1d', '#a3ffcc')">Forest</button>
            <button class="btn" onclick="setTheme('#001f3f', '#80c4ff')">Ocean</button>
            <button class="btn" onclick="setTheme('#330000', '#ff9999')">Crimson</button>
            <button class="btn" onclick="setTheme('#0d1117', '#00ff00')">Hacker</button>
            <button class="btn" onclick="setTheme('#2d0c18', '#ffcc80')">Sunset</button>
            <button class="btn" onclick="setTheme('#000000', '#0000ff')">Rainyware</button>
            <button class="btn" onclick="setTheme('#00ff00', '#006600')">TIME FOR GREEN!!!!!</button>
            <button class="btn" onclick="setTheme('#000000', '#ff0000')">HellofaBluelightFilter</button>
        </div>
    </div>

    <!-- Custom Theme -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">Custom Theme</h2>
        <div class="row">
            <div class="color-picker-wrap">
                <span>Background</span>
                <input type="color" id="bgcolorpicker">
            </div>
            <div class="color-picker-wrap" style="margin-left: 50px;">
                <span>Accent</span>
                <input type="color" id="accolorpicker">
            </div>
        </div>
    </div>

    <!-- App Management -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">App Management</h2>
        <div id="installed-apps-list" class="app-list">
            <!-- Apps will be listed here -->
        </div>
    </div>

    <script>
        const check24hr = document.getElementById('check-24hr');
        const checkSeconds = document.getElementById('check-seconds');

        check24hr.checked = localStorage.getItem('launcher-24hr') === 'true';
        checkSeconds.checked = localStorage.getItem('launcher-seconds') !== 'false';

        check24hr.addEventListener('change', (e) => {
            localStorage.setItem('launcher-24hr', e.target.checked);
        });
        checkSeconds.addEventListener('change', (e) => {
            localStorage.setItem('launcher-seconds', e.target.checked);
        });

        // Notification & Sync Logic
        const configBtn = document.getElementById('config-btn');
        const syncStatus = document.getElementById('sync-status');
        const checkDND = document.getElementById('check-dnd');
        const checkSilent = document.getElementById('check-silent');

        checkDND.checked = localStorage.getItem('launcher-dnd') === 'true';
        checkSilent.checked = localStorage.getItem('launcher-silent') === 'true';

        function updateSyncUI(status) {
            const colors = {
                connected: '#00ff00',
                connecting: '#ffff00',
                disconnected: '#ff9900',
                error: '#ff0000',
                unconfigured: '#888',
                silent: '#444'
            };
            syncStatus.style.color = colors[status] || '#fff';
            syncStatus.textContent = 'Status: ' + status.charAt(0).toUpperCase() + status.slice(1);
        }

        if (window.launcherNotifications) {
            updateSyncUI(window.launcherNotifications.status);
        }

        window.addEventListener('sync-status-change', (e) => {
            updateSyncUI(e.detail);
        });

        // Modal Elements
        const modal = document.getElementById('sync-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalInputAddress = document.getElementById('modal-ws-address');
        const modalInputUser = document.getElementById('modal-ws-user');
        const modalInputToken = document.getElementById('modal-ws-token');
        const modalSaveBtn = document.getElementById('modal-save');
        const modalCancelBtn = document.getElementById('modal-cancel');
        const modeLogin = document.getElementById('mode-login');
        const modeRegister = document.getElementById('mode-register');

        let currentMode = 'login'; // 'login' or 'register'

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'login') {
                modalTitle.textContent = 'Sign In';
                modalSaveBtn.textContent = 'Connect';
                modeLogin.style.background = 'var(--accent-color)';
                modeLogin.style.color = 'var(--bg-color)';
                modeLogin.style.opacity = '1';
                modeRegister.style.background = 'transparent';
                modeRegister.style.color = 'var(--accent-color)';
                modeRegister.style.opacity = '0.6';
            } else {
                modalTitle.textContent = 'Create Account';
                modalSaveBtn.textContent = 'Register & Connect';
                modeRegister.style.background = 'var(--accent-color)';
                modeRegister.style.color = 'var(--bg-color)';
                modeRegister.style.opacity = '1';
                modeLogin.style.background = 'transparent';
                modeLogin.style.color = 'var(--accent-color)';
                modeLogin.style.opacity = '0.6';
            }
        }

        if (modeLogin) modeLogin.addEventListener('click', () => setMode('login'));
        if (modeRegister) modeRegister.addEventListener('click', () => setMode('register'));

        configBtn.addEventListener('click', () => {
            modalInputAddress.value = localStorage.getItem('launcher-ws-address') || "";
            modalInputUser.value = localStorage.getItem('launcher-ws-username') || "";
            modalInputToken.value = localStorage.getItem('launcher-ws-token') || "";
            setMode('login');
            modal.classList.add('active');
        });

        modalCancelBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        const modalError = document.getElementById('modal-error');

        function showError(msg) {
            modalError.textContent = msg;
            modalError.style.display = 'block';
            modalSaveBtn.disabled = false;
            modalSaveBtn.textContent = currentMode === 'login' ? 'Connect' : 'Register & Connect';
        }

        modalSaveBtn.addEventListener('click', async () => {
            const address = modalInputAddress.value.trim();
            const username = modalInputUser.value.trim();
            const token = modalInputToken.value.trim();

            modalError.style.display = 'none';

            if (!address || !username || !token) {
                showError("Please fill in all fields.");
                return;
            }

            modalSaveBtn.disabled = true;
            modalSaveBtn.textContent = "Connecting...";

            try {
                const ws = new WebSocket(address);
                const timeout = setTimeout(() => {
                    ws.close();
                    showError("Connection timed out.");
                }, 7000);

                ws.onopen = () => {
                    clearTimeout(timeout);
                    ws.send(JSON.stringify({ type: currentMode, username, token }));
                };

                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'auth' || data.type === 'register') {
                        if (data.message === 'ok') {
                            localStorage.setItem('launcher-ws-address', address);
                            localStorage.setItem('launcher-ws-username', username);
                            localStorage.setItem('launcher-ws-token', token);
                            modal.classList.remove('active');
                            window.dispatchEvent(new Event('storage'));
                        } else {
                            showError(data.message);
                        }
                    } else if (data.type === 'error') {
                        showError(data.message);
                    }
                    ws.close();
                };

                ws.onerror = (err) => {
                    showError("Connection failed. Check address.");
                    ws.close();
                };

                ws.onclose = () => {
                    if (modalError.style.display === 'none') {
                        modalSaveBtn.disabled = false;
                        modalSaveBtn.textContent = currentMode === 'login' ? 'Connect' : 'Register & Connect';
                    }
                };

            } catch (err) {
                showError("Invalid WebSocket address.");
            }
        });

        // Close on overlay click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        [checkDND, checkSilent].forEach(el => el.addEventListener('change', () => {
            localStorage.setItem('launcher-dnd', checkDND.checked);
            localStorage.setItem('launcher-silent', checkSilent.checked);
            window.dispatchEvent(new Event('storage'));
        }));

        // Backup & Restore Logic
        const backupBtn = document.getElementById('backup-btn');
        const restoreBtn = document.getElementById('restore-btn');

        backupBtn.addEventListener('click', () => {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `launcher-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        restoreBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (re) => {
                    try {
                        const data = JSON.parse(re.target.result);
                        if (confirm("This will overwrite your current settings and layout. Continue?")) {
                            localStorage.clear();
                            for (const key in data) {
                                localStorage.setItem(key, data[key]);
                            }
                            window.location.reload();
                        }
                    } catch (err) {
                        alert("Invalid backup file.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        });

        // Cloud Backup/Restore
        const cloudBackupBtn = document.getElementById('cloud-backup-btn');
        const cloudRestoreBtn = document.getElementById('cloud-restore-btn');

        async function sendCloudCommand(type, data = {}) {
            const address = localStorage.getItem('launcher-ws-address');
            const username = localStorage.getItem('launcher-ws-username');
            const token = localStorage.getItem('launcher-ws-token');

            if (!address || !username || !token) {
                alert("Please configure Sync (WebSocket) first.");
                return;
            }

            return new Promise((resolve, reject) => {
                const ws = new WebSocket(address);
                const timeout = setTimeout(() => { ws.close(); reject("Timeout"); }, 5000);

                ws.onopen = () => {
                    ws.send(JSON.stringify({ type: 'auth', username, token }));
                };

                ws.onmessage = (e) => {
                    const resp = JSON.parse(e.data);
                    if (resp.type === 'auth' && resp.message === 'ok') {
                        ws.send(JSON.stringify({ type, data }));
                    } else if (resp.type === type) {
                        clearTimeout(timeout);
                        ws.close();
                        resolve(resp);
                    } else if (resp.type === 'error') {
                        clearTimeout(timeout);
                        ws.close();
                        reject(resp.message);
                    }
                };

                ws.onerror = () => { clearTimeout(timeout); reject("Connection failed."); };
            });
        }

        cloudBackupBtn.addEventListener('click', async () => {
            cloudBackupBtn.textContent = "Backing up...";
            cloudBackupBtn.disabled = true;
            try {
                const data = { ...localStorage };
                await sendCloudCommand('backup', { data });
                alert("Cloud backup successful!");
            } catch (err) {
                alert("Cloud backup failed: " + err);
            } finally {
                cloudBackupBtn.textContent = "Cloud Backup";
                cloudBackupBtn.disabled = false;
            }
        });

        cloudRestoreBtn.addEventListener('click', async () => {
            if (!confirm("This will overwrite local data with cloud data. Continue?")) return;
            cloudRestoreBtn.textContent = "Restoring...";
            cloudRestoreBtn.disabled = true;
            try {
                const resp = await sendCloudCommand('restore');
                if (resp.data && Object.keys(resp.data).length > 0) {
                    localStorage.clear();
                    for (const key in resp.data) {
                        localStorage.setItem(key, resp.data[key]);
                    }
                    window.location.reload();
                } else {
                    alert("No cloud backup found.");
                }
            } catch (err) {
                alert("Cloud restore failed: " + err);
            } finally {
                cloudRestoreBtn.textContent = "Cloud Restore";
                cloudRestoreBtn.disabled = false;
            }
        });

        // App Management Logic
        async function loadInstalledApps() {
            const listEl = document.getElementById('installed-apps-list');
            listEl.innerHTML = '';

            let allApps = [];
            const cached = localStorage.getItem('launcher-store-cache');
            if (cached) { allApps = JSON.parse(cached); }

            const downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '["launcher-settings", "apps", "about", "re-arrange", "notifications"]');
            const appSizes = JSON.parse(localStorage.getItem('launcher-app-sizes') || '{}');
            const systemIds = ["launcher-settings", "apps", "about", "re-arrange", "notifications"];

            const installed = allApps.filter(app => downloadedIds.includes(app.id) && !systemIds.includes(app.id));

            if (installed.length === 0) {
                listEl.innerHTML = '<div style="opacity: 0.5; padding: 20px;">No external apps installed.</div>';
                return;
            }

            installed.forEach(app => {
                const item = document.createElement('div');
                item.className = 'app-item';

                const info = document.createElement('div');
                info.className = 'app-info';

                let size = appSizes[app.id] || "Unknown";
                if (size === "Unknown") {
                    // Attempt to estimate based on URL
                    if (app.url.includes('google.com') || app.url.includes('youtube.com') || app.url.includes('spotify.com')) {
                        size = "2.4 MB"; // Base assets estimate
                    } else if (app.url.endsWith('.html')) {
                        size = "45 KB";
                    }
                }

                info.innerHTML = `<span class="app-name-label">${app.name} <span style="font-size: 0.9rem; opacity: 0.5; margin-left: 10px;">${size}</span></span><span style="opacity: 0.6; font-size: 0.9rem;">${app.id}</span>`;

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = 'Delete';
                delBtn.onclick = () => deleteApp(app.id);

                item.appendChild(info);
                item.appendChild(delBtn);
                listEl.appendChild(item);
            });
        }

        function deleteApp(appId) {
            // Remove from downloaded list
            let downloadedIds = JSON.parse(localStorage.getItem('launcher-downloaded-ids') || '[]');
            downloadedIds = downloadedIds.filter(id => id !== appId);
            localStorage.setItem('launcher-downloaded-ids', JSON.stringify(downloadedIds));

            // Remove size
            let appSizes = JSON.parse(localStorage.getItem('launcher-app-sizes') || '{}');
            delete appSizes[appId];
            localStorage.setItem('launcher-app-sizes', JSON.stringify(appSizes));

            // Remove from grid and folders
            let grid = JSON.parse(localStorage.getItem('launcher-grid') || '[]');
            if (grid.length > 0) {
                const newGrid = grid.map(item => {
                    if (!item) return null;
                    if (typeof item === 'string') {
                        return item === appId ? null : item;
                    }
                    if (typeof item === 'object' && item.type === 'folder') {
                        // Cleanup apps INSIDE folder too
                        if (Array.isArray(item.apps)) {
                            item.apps = item.apps.map(id => id === appId ? null : id);
                        }
                        return item;
                    }
                    return item;
                });
                localStorage.setItem('launcher-grid', JSON.stringify(newGrid));
            }

            loadInstalledApps();
            window.dispatchEvent(new Event('storage'));
        }

        loadInstalledApps();

        function setTheme(bgStr, accentStr) {
            document.documentElement.style.setProperty('--bg-color', bgStr);
            document.documentElement.style.setProperty('--accent-color', accentStr);
            localStorage.setItem('launcher-bg', bgStr);
            localStorage.setItem('launcher-accent', accentStr);
            document.getElementById('bgcolorpicker').value = bgStr;
            document.getElementById('accolorpicker').value = accentStr;
            window.dispatchEvent(new Event('storage'));
        }

        const bgPicker = document.getElementById('bgcolorpicker');
        const acPicker = document.getElementById('accolorpicker');

        function RgbToHex(colorStr) {
            const ctx = document.createElement('canvas').getContext('2d');
            ctx.fillStyle = colorStr;
            return ctx.fillStyle;
        }
        bgPicker.value = RgbToHex(getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() || '#000000');
        acPicker.value = RgbToHex(getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#ffffff');

        bgPicker.addEventListener('input', (e) => setTheme(e.target.value, localStorage.getItem('launcher-accent')));
        acPicker.addEventListener('input', (e) => setTheme(localStorage.getItem('launcher-bg'), e.target.value));

        const triggerFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => { }); } };
        document.addEventListener('DOMContentLoaded', triggerFullscreen);
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        // History API back button interceptor
        history.replaceState({ page: 'applet' }, '');
        history.pushState({ page: 'applet-active' }, '');
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'applet') {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = 'index.html'; }, 400);
            }
        });

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = btn.href; }, 400);
            });
        });
    </script>
    <script src="notifications.js"></script>
</body>

</html>
