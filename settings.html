<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launcher Settings</title>
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background-color: var(--bg-color);
            transition: background-color 0.75s ease;
        }

        body {
            background-color: transparent;
            color: var(--accent-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-y: auto;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            transition: background-color 0.75s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            animation: fadeIn 0.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.85);
            }
        }

        .fade-out {
            animation: fadeOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards !important;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 40px;
        }

        .close-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 2vw;
            cursor: pointer;
            border: 3px solid var(--accent-color);
            padding: 10px 25px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        h1 {
            font-size: 4vw;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 15px;
        }

        .section {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 2vw;
            margin-bottom: 25px;
            opacity: 0.9;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            background: transparent;
            transition: all 0.2s;
            font-weight: bold;
            text-align: center;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        label {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 25px;
            height: 25px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .color-picker-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        input[type="color"] {
            width: 80px;
            height: 50px;
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 2px;
            background: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <script>
        const bg = localStorage.getItem('launcher-bg') || '#000000';
        const accent = localStorage.getItem('launcher-accent') || '#ffffff';
        document.documentElement.style.setProperty('--bg-color', bg);
        document.documentElement.style.setProperty('--accent-color', accent);
    </script>
    <div class="header">
        <h1>Launcher Settings</h1>
        <a href="launcher toonis.html" class="close-btn">Back</a>
    </div>

    <!-- Clock Settings -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">Clock Preferences</h2>
        <div class="row">
            <label><input type="checkbox" id="check-24hr"> 24-Hour Mode</label>
            <label style="margin-left: 30px;"><input type="checkbox" id="check-seconds"> Show Seconds</label>
        </div>
    </div>

    <!-- Presets -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">Theme Presets</h2>
        <div class="theme-grid">
            <button class="btn" onclick="setTheme('#000000', '#ffffff')">OLED Black</button>
            <button class="btn" onclick="setTheme('#1a1a1a', '#ffffff')">Dark Gray</button>
            <button class="btn" onclick="setTheme('#ffffff', '#000000')">Light Mode</button>
            <button class="btn" onclick="setTheme('#001524', '#ffecd1')">Midnight</button>
            <button class="btn" onclick="setTheme('#2d1b4e', '#d4b8ff')">Purple</button>
            <button class="btn" onclick="setTheme('#4a1528', '#ffb3c6')">Pink</button>
            <button class="btn" onclick="setTheme('#3d1c00', '#ffb067')">Orange</button>
            <button class="btn" onclick="setTheme('#0b2b1d', '#a3ffcc')">Forest</button>
            <button class="btn" onclick="setTheme('#001f3f', '#80c4ff')">Ocean</button>
            <button class="btn" onclick="setTheme('#330000', '#ff9999')">Crimson</button>
            <button class="btn" onclick="setTheme('#0d1117', '#00ff00')">Hacker</button>
            <button class="btn" onclick="setTheme('#2d0c18', '#ffcc80')">Sunset</button>
            <button class="btn" onclick="setTheme('#000000', '#0000ff')">Rainyware</button>
            <button class="btn" onclick="setTheme('#00ff00', '#006600')">GREEN!</button>
        </div>
    </div>

    <!-- Custom Theme -->
    <div class="section" style="text-align: center;">
        <h2 class="section-title">Custom Theme</h2>
        <div class="row">
            <div class="color-picker-wrap">
                <span>Background</span>
                <input type="color" id="bgcolorpicker">
            </div>
            <div class="color-picker-wrap" style="margin-left: 50px;">
                <span>Accent</span>
                <input type="color" id="accolorpicker">
            </div>
        </div>
    </div>

    <script>
        const check24hr = document.getElementById('check-24hr');
        const checkSeconds = document.getElementById('check-seconds');

        check24hr.checked = localStorage.getItem('launcher-24hr') === 'true';
        checkSeconds.checked = localStorage.getItem('launcher-seconds') !== 'false';

        check24hr.addEventListener('change', (e) => {
            localStorage.setItem('launcher-24hr', e.target.checked);
        });
        checkSeconds.addEventListener('change', (e) => {
            localStorage.setItem('launcher-seconds', e.target.checked);
        });

        function setTheme(bgStr, accentStr) {
            document.documentElement.style.setProperty('--bg-color', bgStr);
            document.documentElement.style.setProperty('--accent-color', accentStr);
            localStorage.setItem('launcher-bg', bgStr);
            localStorage.setItem('launcher-accent', accentStr);
            document.getElementById('bgcolorpicker').value = bgStr;
            document.getElementById('accolorpicker').value = accentStr;
        }

        const bgPicker = document.getElementById('bgcolorpicker');
        const acPicker = document.getElementById('accolorpicker');

        function RgbToHex(colorStr) {
            const ctx = document.createElement('canvas').getContext('2d');
            ctx.fillStyle = colorStr;
            return ctx.fillStyle;
        }
        bgPicker.value = RgbToHex(getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim() || '#000000');
        acPicker.value = RgbToHex(getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#ffffff');

        bgPicker.addEventListener('input', (e) => setTheme(e.target.value, localStorage.getItem('launcher-accent')));
        acPicker.addEventListener('input', (e) => setTheme(localStorage.getItem('launcher-bg'), e.target.value));

        const triggerFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => { }); } };
        document.addEventListener('DOMContentLoaded', triggerFullscreen);
        document.body.addEventListener('click', triggerFullscreen, { once: true });

        // History API back button interceptor
        history.replaceState({ page: 'applet' }, '');
        history.pushState({ page: 'applet-active' }, '');
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'applet') {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = 'launcher toonis.html'; }, 400);
            }
        });

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = btn.href; }, 400);
            });
        });
    </script>
</body>

</html>
